title: Detect attackers scanning for vulnerable JBoss servers
id: 104658f4-afdc-499e-9719-17243f982681
status: experimental
level: medium
author: Bhavin Patel, Splunk
description: The following analytic identifies specific GET or HEAD requests to web servers that indicate reconnaissance attempts to find vulnerable JBoss servers. It leverages data from the Web data model,
  focusing on HTTP methods and URLs associated with JBoss management interfaces. This activity is significant because it often precedes exploitation attempts using tools like JexBoss, which can compromise
  the server. If confirmed malicious, attackers could gain unauthorized access, execute arbitrary code, or escalate privileges, leading to potential data breaches and system compromise.
tags:
- attack.T1082
- attack.T1133
date: '2020-04-29'
logsource:
  category: webserver
detection:
  selection_0:
    cs-method: GET
  selection_1:
    cs-method: HEAD
  condition: selection_0 and selection_1
