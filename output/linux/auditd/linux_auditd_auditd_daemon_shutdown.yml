title: Linux Auditd Auditd Daemon Shutdown
id: 6e2574b3-e24b-4321-ae3c-ba83a75bb714
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the unexpected termination of the Linux Audit daemon (auditd) by monitoring for log entries of type DAEMON_END. This event signifies that the audit logging service
  has stopped, either due to a legitimate system shutdown, manual administrative action, or potentially malicious tampering. Since auditd is responsible for recording critical security events, its sudden
  stoppage may indicate an attempt to disable security monitoring or evade detection during an attack. This detection should be correlated with system logs to determine whether the shutdown was part of
  routine maintenance or an anomaly. If confirmed as malicious, this could lead to a compromised system where security events are no longer being logged, allowing attackers to operate undetected. Therefore,
  monitoring and alerting on auditd shutdown events is crucial for maintaining the integrity of system security monitoring.
references:
- https://docs.redhat.com/en/documentation/red_hat_enterprise_linux/6/html/security_guide/sec-audit_record_types
tags:
- attack.t1685.004
date: '2024-08-12'
original_spl: |-
  `linux_auditd` type=DAEMON_END
    | rename host as dest
    | stats count min(_time) as firstTime max(_time) as lastTime
      BY type op res
         auid dest pid
    | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)`
    | `linux_auditd_auditd_daemon_shutdown_filter`
splunk_rule_id: 6e2574b3-e24b-4321-ae3c-ba83a75bb714
splunk_rule_type: Anomaly
logsource:
  product: linux
  service: auditd
detection:
  selection_0:
    type: DAEMON_END
  condition: selection_0
