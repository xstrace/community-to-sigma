title: Linux MySQL Privilege Escalation
id: c0d810f4-230c-44ea-b703-989da02ff145
status: stable
level: medium
author: Gowthamaraj Rajendran, Splunk
description: The following analytic detects the execution of MySQL commands with elevated privileges using sudo, which can lead to privilege escalation. It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process execution logs that include command-line details. This activity is significant because it indicates a potential misuse of MySQL to execute system commands as root, which
  could allow an attacker to gain root shell access. If confirmed malicious, this could result in full control over the affected system, leading to severe security breaches and unauthorized access to sensitive
  data.
references:
- https://gtfobins.github.io/gtfobins/mysql/
tags:
- attack.T1548_003
date: '2022-08-10'
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    CommandLine|contains: '*mysql*-e*'
  selection_1:
    CommandLine|contains: '*\!**'
  selection_2:
    CommandLine|contains: '*sudo*'
  condition: selection_0 and selection_1 and selection_2
