title: Linux Indicator Removal Clear Cache
id: e0940505-0b73-4719-84e6-cb94c44a5245
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects processes that clear or free page cache on a Linux system. It leverages Endpoint Detection and Response (EDR) data, focusing on specific command-line executions
  involving the kernel system request `drop_caches`. This activity is significant as it may indicate an attempt to delete forensic evidence or the presence of wiper malware like Awfulshred. If confirmed
  malicious, this behavior could allow an attacker to cover their tracks, making it difficult to investigate other malicious activities or system compromises.
references:
- https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/overview-of-the-cyber-weapons-used-in-the-ukraine-russia-war/
- https://cert.gov.ua/article/3718487
tags:
- attack.T1070
date: '2023-02-08'
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    Image|contains:
    - dash
    - sudo
    - bash
  selection_1:
    CommandLine|contains:
    - '* echo 3 > *'
    - '* echo 2 > *'
    - '* echo 1 > *'
  selection_2:
    CommandLine|contains: '*/proc/sys/vm/drop_caches'
  condition: selection_0 and selection_1 and selection_2
