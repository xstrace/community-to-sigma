title: Linux Binary Launched Process with Null Argv
id: 0085652a-e682-45a2-a40c-5bb68b8f260e
status: stable
level: medium
author: Raven Tait, Splunk
description: The following analytic detects kernel-level events where a setuid binary launches a shell or interpreter with a NULL argument vector, which occurs when a privilege escalation exploit gains
  root and executes a process via execve() without constructing a legitimate argument array.
references:
- https://www.elastic.co/security-labs/copy-fail-dirtyfrag-linux-page-bugs-in-the-wild
tags:
- attack.t1068
date: '2026-05-12'
original_spl: |-
  sourcetype="linux_messages_syslog" "NULL argv" "empty string added"
  | rex field=_raw "process '(?<launching_process>[^']+)' launched '(?<launched_process>[^']+)' with NULL argv"
  | where isnotnull(launching_process) AND isnotnull(launched_process)
  | stats
      count                        AS occurrences,
      min(_time)                   AS firstTime,
      max(_time)                   AS lastTime,
      values(_raw)                 AS message,
      values(host)                 AS dest
      by host, launching_process, launched_process
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | table dest, launching_process, launched_process,
          firstTime, lastTime, occurrences, message
  | `linux_binary_launched_process_with_null_argv_filter`
splunk_rule_id: 0085652a-e682-45a2-a40c-5bb68b8f260e
splunk_rule_type: TTP
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    sourcetype: linux_messages_syslog
  condition: selection_0
