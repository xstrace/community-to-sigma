title: Linux Service Restarted
id: 084275ba-61b8-11ec-8d64-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the restarting or re-enabling of services on Linux systems using the `systemctl` or `service` commands. It leverages data from Endpoint Detection and Response
  (EDR) agents, focusing on process and command-line execution logs. This activity is significant as adversaries may use it to maintain persistence or execute unauthorized actions. If confirmed malicious,
  this behavior could lead to repeated execution of malicious payloads, unauthorized access, or data destruction. Security analysts should investigate these events to mitigate risks and prevent further
  compromise.
references:
- https://attack.mitre.org/techniques/T1543/003/
tags:
- attack.t1053.006
date: '2021-12-23'
original_spl: |-
  | tstats `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes
    WHERE (
          Processes.process_name IN ("systemctl", "service")
          OR
          Processes.process IN ("*systemctl *", "*service *")
      )
      Processes.process IN ("*restart*", "*reload*", "*reenable*")
    BY Processes.action Processes.dest Processes.original_file_name
       Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid
       Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path
       Processes.process Processes.process_exec Processes.process_guid
       Processes.process_hash Processes.process_id Processes.process_integrity_level
       Processes.process_name Processes.process_path Processes.user
       Processes.user_id Processes.vendor_product
  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | `linux_service_restarted_filter`
splunk_rule_id: 084275ba-61b8-11ec-8d64-acde48001122
splunk_rule_type: Anomaly
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    Image:
    - systemctl
    - service
  selection_1:
    CommandLine|contains:
    - 'systemctl '
    - 'service '
  selection_2:
    CommandLine|contains:
    - restart
    - reload
    - reenable
  condition: selection_0 and selection_1 and selection_2
