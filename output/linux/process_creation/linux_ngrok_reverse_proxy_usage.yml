title: Linux Ngrok Reverse Proxy Usage
id: bc84d574-708c-467d-b78a-4c1e20171f97
status: stable
level: medium
author: Michael Haag, Splunk
description: The following analytic detects the use of Ngrok on a Linux operating system. It leverages data from Endpoint Detection and Response (EDR) agents, focusing on process names and command-line
  arguments associated with Ngrok. This activity is significant because Ngrok can be used by adversaries to establish reverse proxies, potentially bypassing network defenses. If confirmed malicious, this
  could allow attackers to create persistent, unauthorized access channels, facilitating data exfiltration or further exploitation of the compromised system.
references:
- https://ngrok.com
- https://www.cisa.gov/uscert/sites/default/files/publications/aa22-320a_joint_csa_iranian_government-sponsored_apt_actors_compromise_federal%20network_deploy_crypto%20miner_credential_harvester.pdf
tags:
- attack.T1572
- attack.T1090
- attack.T1102
date: '2023-01-12'
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    Image: ngrok
  selection_1:
    CommandLine|contains:
    - '*start*'
    - '*--config*'
    - '*http*'
    - '*authtoken*'
    - '*http*'
    - '*tcp*'
  condition: selection_0 and selection_1
