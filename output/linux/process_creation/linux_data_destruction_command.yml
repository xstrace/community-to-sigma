title: Linux Data Destruction Command
id: b11d3979-b2f7-411b-bb1a-bd00e642173b
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the execution of a Unix shell command designed to wipe root directories on a Linux host. It leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on the 'rm' command with force recursive deletion and the '--no-preserve-root' option. This activity is significant as it indicates potential data destruction attempts, often associated with
  malware like Awfulshred. If confirmed malicious, this behavior could lead to severe data loss, system instability, and compromised integrity of the affected Linux host. Immediate investigation and response
  are crucial to mitigate potential damage.
references:
- https://cert.gov.ua/article/3718487
- https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/overview-of-the-cyber-weapons-used-in-the-ukraine-russia-war/
tags:
- attack.T1485
date: '2023-02-08'
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    Image: rm
  selection_1:
    CommandLine|contains:
    - '* -rf*'
    - '* -fr*'
  selection_2:
    CommandLine|contains: '* --no-preserve-root'
  condition: selection_0 and selection_1 and selection_2
