title: Linux Impair Defenses Process Kill
id: 435c6b33-adf9-47fe-be87-8e29fd6654f5
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic identifies the execution of the 'pkill' command, which is used to terminate processes on a Linux system. It leverages data from Endpoint Detection and Response (EDR)
  agents, focusing on process names and command-line executions. This activity is significant because threat actors often use 'pkill' to disable security defenses or terminate critical processes, facilitating
  further malicious actions. If confirmed malicious, this behavior could lead to the disruption of security applications, enabling attackers to evade detection and potentially corrupt or destroy files on
  the targeted system.
references:
- https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/overview-of-the-cyber-weapons-used-in-the-ukraine-russia-war/
- https://cert.gov.ua/article/3718487
tags:
- attack.T1685
date: '2023-02-08'
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    Image|contains:
    - pgrep
    - pkill
  selection_1:
    CommandLine|contains: '*pkill *'
  condition: selection_0 and selection_1
