title: Linux Make Privilege Escalation
id: 80b22836-5091-4944-80ee-f733ac443f4f
status: stable
level: medium
author: Gowthamaraj Rajendran, Splunk
description: The following analytic detects the use of the 'make' command with elevated privileges to execute system commands as root, potentially leading to a root shell. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on command-line executions that include 'make', '--eval', and 'sudo'. This activity is significant because it indicates a possible privilege escalation attempt,
  allowing a user to gain root access. If confirmed malicious, an attacker could achieve full control over the system, execute arbitrary commands, and compromise the entire environment.
references:
- https://gtfobins.github.io/gtfobins/make/
- https://www.javatpoint.com/linux-make-command
tags:
- attack.t1548.003
date: '2022-08-10'
original_spl: |-
  | tstats `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes
    WHERE Processes.process="*make*-s*"
      AND
      Processes.process="*--eval*"
      AND
      Processes.process="*sudo*"
    BY Processes.action Processes.dest Processes.original_file_name
       Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid
       Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path
       Processes.process Processes.process_exec Processes.process_guid
       Processes.process_hash Processes.process_id Processes.process_integrity_level
       Processes.process_name Processes.process_path Processes.user
       Processes.user_id Processes.vendor_product
  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | `linux_make_privilege_escalation_filter`
splunk_rule_id: 80b22836-5091-4944-80ee-f733ac443f4f
splunk_rule_type: Anomaly
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    CommandLine|contains: make*-s
  selection_1:
    CommandLine|contains: --eval
  selection_2:
    CommandLine|contains: sudo
  condition: selection_0 and selection_1 and selection_2
