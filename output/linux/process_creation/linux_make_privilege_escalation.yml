title: Linux Make Privilege Escalation
id: 80b22836-5091-4944-80ee-f733ac443f4f
status: stable
level: medium
author: Gowthamaraj Rajendran, Splunk
description: The following analytic detects the use of the 'make' command with elevated privileges to execute system commands as root, potentially leading to a root shell. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on command-line executions that include 'make', '--eval', and 'sudo'. This activity is significant because it indicates a possible privilege escalation attempt,
  allowing a user to gain root access. If confirmed malicious, an attacker could achieve full control over the system, execute arbitrary commands, and compromise the entire environment.
references:
- https://gtfobins.github.io/gtfobins/make/
- https://www.javatpoint.com/linux-make-command
tags:
- attack.T1548_003
date: '2022-08-10'
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    CommandLine|contains: '*make*-s*'
  selection_1:
    CommandLine|contains: '*--eval*'
  selection_2:
    CommandLine|contains: '*sudo*'
  condition: selection_0 and selection_1 and selection_2
