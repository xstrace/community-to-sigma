title: Linux Possible Access To Sudoers File
id: 4479539c-71fc-11ec-b2e2-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects potential access or modification of the /etc/sudoers file on a Linux system. It leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  processes like "cat," "nano," "vim," and "vi" accessing the /etc/sudoers file. This activity is significant because the sudoers file controls user permissions for executing commands with elevated privileges.
  If confirmed malicious, an attacker could gain persistence or escalate privileges, compromising the security of the targeted host.
references:
- https://attack.mitre.org/techniques/T1548/003/
- https://web.archive.org/web/20210708035426/https://www.cobaltstrike.com/downloads/csmanual43.pdf
tags:
- attack.T1548_003
date: '2022-01-10'
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    Image|contains:
    - cat
    - nano*
    - vim*
    - vi*
  selection_1:
    CommandLine|contains: '*/etc/sudoers*'
  condition: selection_0 and selection_1
