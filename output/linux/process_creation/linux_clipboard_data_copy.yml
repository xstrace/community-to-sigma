title: Linux Clipboard Data Copy
id: 7173b2ad-6146-418f-85ae-c3479e4515fc
status: stable
level: medium
author: Michael Haag, Splunk
description: The following analytic detects the use of the Linux 'xclip' command to copy data from the clipboard. It leverages Endpoint Detection and Response (EDR) telemetry, focusing on process names
  and command-line arguments related to clipboard operations. This activity is significant because adversaries can exploit clipboard data to capture sensitive information such as passwords or IP addresses.
  If confirmed malicious, this technique could lead to unauthorized data exfiltration, compromising sensitive information and potentially aiding further attacks within the environment.
references:
- https://attack.mitre.org/techniques/T1115/
- https://linux.die.net/man/1/xclip
tags:
- attack.T1115
date: '2022-06-17'
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    Image: xclip
  selection_1:
    CommandLine|contains:
    - '*-o *'
    - '*-sel *'
    - '*-selection *'
    - '*clip *'
    - '*clipboard*'
  condition: selection_0 and selection_1
