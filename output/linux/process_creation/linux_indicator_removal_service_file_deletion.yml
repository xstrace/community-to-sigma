title: Linux Indicator Removal Service File Deletion
id: 6c077f81-2a83-4537-afbc-0e62e3215d55
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the deletion of Linux service unit configuration files by suspicious processes. It leverages Endpoint Detection and Response (EDR) telemetry, focusing on processes
  executing the 'rm' command targeting '.service' files. This activity is significant as it may indicate malware attempting to disable critical services or security products, a common defense evasion tactic.
  If confirmed malicious, this behavior could lead to service disruption, security tool incapacitation, or complete system compromise, severely impacting the integrity and availability of the affected Linux
  host.
references:
- https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/overview-of-the-cyber-weapons-used-in-the-ukraine-russia-war/
- https://cert.gov.ua/article/3718487
tags:
- attack.T1070_004
date: '2023-02-08'
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    Image: rm
  selection_1:
    CommandLine|contains: '*rm *'
  selection_2:
    CommandLine|contains: '*.service'
  condition: selection_0 and selection_1 and selection_2
