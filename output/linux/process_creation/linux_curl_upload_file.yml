title: Linux Curl Upload File
id: c1de2d9a-0c02-4bb4-a49a-510c6e9cf2bf
status: stable
level: medium
author: Michael Haag, Splunk
description: The following analytic detects the use of the curl command with specific switches (-F, --form, --upload-file, -T, -d, --data, --data-raw, -I, --head) to upload AWS credentials or configuration
  files to a remote destination. This detection leverages data from Endpoint Detection and Response (EDR) agents, focusing on command-line executions and process details. This activity is significant as
  it may indicate an attempt to exfiltrate sensitive AWS credentials, a technique known to be used by the TeamTNT group. If confirmed malicious, this could lead to unauthorized access and potential compromise
  of AWS resources.
references:
- https://curl.se/docs/manpage.html
- https://www.cadosecurity.com/team-tnt-the-first-crypto-mining-worm-to-steal-aws-credentials/
- https://gtfobins.github.io/gtfobins/curl/
tags:
- attack.T1105
date: '2022-07-29'
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    Image: curl
  selection_1:
    CommandLine|contains:
    - '*-F *'
    - '*--form *'
    - '*--upload-file *'
    - '*-T *'
    - '*-d *'
    - '*--data *'
    - '*--data-raw *'
    - '*-I *'
    - '*--head *'
  selection_2:
    CommandLine|contains:
    - '*.aws/credentials*'
    - .
    - '*.aws/config*'
  condition: selection_0 and selection_1 and selection_2
