title: Linux Change File Owner To Root
id: c1400ea2-6257-11ec-ad49-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the use of the 'chown' command to change a file owner to 'root' on a Linux system. It leverages Endpoint Detection and Response (EDR) telemetry, specifically
  monitoring command-line executions and process details. This activity is significant as it may indicate an attempt to escalate privileges by adversaries, malware, or red teamers. If confirmed malicious,
  this action could allow an attacker to gain root-level access, leading to full control over the compromised host and potential persistence within the environment.
references:
- https://unix.stackexchange.com/questions/101073/how-to-change-permissions-from-root-user-to-all-users
- https://askubuntu.com/questions/617850/changing-from-user-to-superuser
tags:
- attack.T1222_002
date: '2022-01-05'
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    Image: chown
  selection_1:
    CommandLine|contains: '*chown *'
  selection_2:
    CommandLine|contains: '* root *'
  condition: selection_0 and selection_1 and selection_2
