title: Linux Possible Cronjob Modification With Editor
id: dcc89bde-5f24-11ec-87ca-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects potential unauthorized modifications to Linux cronjobs using text editors like "nano," "vi," or "vim." It identifies this activity by monitoring command-line
  executions that interact with cronjob configuration paths. This behavior is significant for a SOC as it may indicate attempts at privilege escalation or establishing persistent access. If confirmed malicious,
  the impact could be severe, allowing attackers to execute damaging actions such as data theft, system sabotage, or further network penetration.
references:
- https://attack.mitre.org/techniques/T1053/003/
tags:
- attack.t1053.003
date: '2021-12-21'
original_spl: |-
  | tstats `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes
    WHERE (
          Processes.process_name IN("nano","vim.basic")
          OR
          Processes.process IN ("*nano *", "*vi *", "*vim *")
      )
      AND Processes.process IN("*/etc/cron*", "*/var/spool/cron/*", "*/etc/anacrontab*")
    BY Processes.action Processes.dest Processes.original_file_name
       Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid
       Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path
       Processes.process Processes.process_exec Processes.process_guid
       Processes.process_hash Processes.process_id Processes.process_integrity_level
       Processes.process_name Processes.process_path Processes.user
       Processes.user_id Processes.vendor_product
  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | `linux_possible_cronjob_modification_with_editor_filter`
splunk_rule_id: dcc89bde-5f24-11ec-87ca-acde48001122
splunk_rule_type: Hunting
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    Image:
    - nano
    - vim.basic
  selection_1:
    CommandLine|contains:
    - 'nano '
    - 'vi '
    - 'vim '
  selection_2:
    CommandLine|contains:
    - /etc/cron
    - /var/spool/cron/
    - /etc/anacrontab
  condition: selection_0 and selection_1 and selection_2
