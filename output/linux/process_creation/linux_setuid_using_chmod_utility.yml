title: Linux Setuid Using Chmod Utility
id: bf0304b6-6250-11ec-9d7c-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the execution of the chmod utility to set the SUID or SGID bit on files, which can allow users to temporarily gain root or group-level access. This detection
  leverages data from Endpoint Detection and Response (EDR) agents, focusing on process names and command-line arguments related to chmod. This activity is significant as it can indicate an attempt to escalate
  privileges or maintain persistence on a system. If confirmed malicious, an attacker could gain elevated access, potentially compromising sensitive data or critical system functions.
references:
- https://www.hackingarticles.in/linux-privilege-escalation-using-capabilities/
tags:
- attack.T1548_001
date: '2021-12-23'
logsource:
  category: process_creation
  product: linux
detection:
  selection_0:
    Image: chmod
  selection_1:
    CommandLine|contains: '*chmod *'
  selection_2:
    CommandLine|contains:
    - '* g+s *'
    - '* u+s *'
    - '* 4777 *'
    - '* 4577 *'
  condition: selection_0 and selection_1 and selection_2
