title: Windows Excessive Disabled Services Event
id: c3f85976-94a5-11ec-9a58-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic identifies an excessive number of system events where services are modified from start to disabled. It leverages Windows Event Logs (EventCode 7040) to detect multiple
  service state changes on a single host. This activity is significant as it may indicate an adversary attempting to disable security applications or other critical services, potentially leading to defense
  evasion or destructive actions. If confirmed malicious, this behavior could allow attackers to disable security defenses, disrupt system operations, and achieve their objectives on the compromised system.
