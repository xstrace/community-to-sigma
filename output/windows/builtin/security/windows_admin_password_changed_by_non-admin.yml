title: Windows Admin Password Changed by Non-Admin
id: 6d4c4d88-cd60-43a1-8c70-c74a9614f724
status: stable
level: medium
author: Raven Tait, Splunk
description: The following analytic detects when a unprivileged user changes an Admin accounts password. This is a common artifact of successful exploitation of the BlueHammer Windows Defender privilege
  escalation. The attacker's process momentarily changes the passwords of high-value local accounts including the built-in Administrator to spawn an authenticated shell session, then immediately reverts
  the passwords to avoid detection. This uses EventID 4723 to log this activity.
references:
- https://github.com/Nightmare-Eclipse/BlueHammer
