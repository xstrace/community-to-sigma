title: Windows Multiple Invalid Users Failed To Authenticate Using NTLM
id: 57ad5a64-9df7-11eb-a290-acde48001122
status: stable
level: medium
author: Mauricio Velazco, Splunk
description: The following analytic detects a single source endpoint failing to authenticate with 30 unique invalid users using the NTLM protocol. It leverages EventCode 4776 from Domain Controller logs,
  focusing on error code 0xC0000064, which indicates non-existent usernames. This behavior is significant as it may indicate a Password Spraying attack, where an adversary attempts to gain initial access
  or elevate privileges. If confirmed malicious, this activity could lead to unauthorized access, privilege escalation, and potential compromise of sensitive information within the Active Directory environment.
references:
- https://attack.mitre.org/techniques/T1110/003/
- https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/audit-credential-validation
- https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4776
tags:
- attack.t1110.003
date: '2021-04-14'
original_spl: |-
  `wineventlog_security` EventCode=4776 TargetUserName!=*$ Status=0xc0000064
    | bucket span=5m _time
    | stats dc(TargetUserName) AS unique_accounts values(TargetUserName) as tried_accounts values(dest) as dest
      BY _time, Workstation
    | where unique_accounts > 30
    | `windows_multiple_invalid_users_failed_to_authenticate_using_ntlm_filter`
splunk_rule_id: 57ad5a64-9df7-11eb-a290-acde48001122
splunk_rule_type: TTP
logsource:
  product: windows
  service: security
detection:
  selection_0:
    EventID: 4776
  selection_1:
    TargetUserName|endswith: $
  selection_2:
    Status: '0xc0000064'
  condition: selection_0 and selection_1 and selection_2
