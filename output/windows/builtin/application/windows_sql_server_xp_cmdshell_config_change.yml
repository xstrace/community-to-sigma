title: Windows SQL Server xp_cmdshell Config Change
id: 5eb76fe2-a869-4865-8c4c-8cff424b18b1
status: stable
level: medium
author: Michael Haag, Splunk, sidoyle from Splunk Community
description: This detection identifies when the xp_cmdshell configuration is modified in SQL Server. The xp_cmdshell extended stored procedure allows execution of operating system commands and programs
  from SQL Server, making it a high-risk feature commonly abused by attackers for privilege escalation and lateral movement.
