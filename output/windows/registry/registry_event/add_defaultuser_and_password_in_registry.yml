title: Add DefaultUser And Password In Registry
id: d4a3eb62-0f1e-11ec-a971-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk, Steven Dick
description: The following analytic detects suspicious registry modifications that implement auto admin logon by adding DefaultUserName and DefaultPassword values. It leverages data from the Endpoint.Registry
  data model, specifically monitoring changes to the "SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" registry path. This activity is significant because it is associated with BlackMatter ransomware,
  which uses this technique to automatically log on to compromised hosts and continue encryption after a safe mode boot. If confirmed malicious, this could allow attackers to maintain persistence and further
  encrypt the network, leading to significant data loss and operational disruption.
references:
- https://news.sophos.com/en-us/2021/08/09/blackmatter-ransomware-emerges-from-the-shadow-of-darkside/
tags:
- attack.T1552_002
date: '2021-09-06'
logsource:
  category: registry_event
  product: windows
detection:
  selection_0:
    TargetObject|contains: '*SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon*'
    Details: DefaultPassword
  selection_1:
    Details: DefaultUserName
  condition: selection_0 and selection_1
