title: Sdclt UAC Bypass
id: d71efbf6-da63-11eb-8c6e-acde48001122
status: stable
level: medium
author: Steven Dick, Teoderick Contreras, Splunk
description: The following analytic detects suspicious modifications to the sdclt.exe registry, a technique often used to bypass User Account Control (UAC). It leverages data from Endpoint Detection and
  Response (EDR) agents, focusing on specific registry paths and values associated with sdclt.exe. This activity is significant because UAC bypasses can allow attackers to execute payloads with elevated
  privileges without user consent. If confirmed malicious, this could lead to unauthorized code execution, privilege escalation, and potential persistence within the environment, posing a severe security
  risk.
references:
- https://enigma0x3.net/2017/03/17/fileless-uac-bypass-using-sdclt-exe/
- https://github.com/hfiref0x/UACME
- https://www.cyborgsecurity.com/cyborg-labs/threat-hunt-deep-dives-user-account-control-bypass-via-registry-modification/
tags:
- attack.T1548_002
date: '2021-07-08'
logsource:
  category: registry_event
  product: windows
detection:
  selection_0:
    TargetObject|contains: '*\Windows\CurrentVersion\App Paths\control.exe*'
  selection_1:
    TargetObject|contains: '*\exefile\shell\runas\command\*'
  selection_2:
    Details: (Default)
  selection_3:
    Details: IsolatedCommand
  condition: selection_0 and selection_1 and selection_2 and selection_3
