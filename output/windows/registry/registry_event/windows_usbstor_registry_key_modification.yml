title: Windows USBSTOR Registry Key Modification
id: a345980a-417d-4ed3-9fb4-cac30c9405a0
status: stable
level: medium
author: Steven Dick
description: This analytic is used to identify when a USB removable media device is attached to a Windows host. In this scenario we are querying the Endpoint Registry data model to look for modifications
  to the HKLM\System\CurrentControlSet\Enum\USBSTOR\ key. Adversaries and Insider Threats may use removable media devices for several malicious activities, including initial access, execution, and exfiltration.
references:
- https://attack.mitre.org/techniques/T1200/
- https://www.cisa.gov/news-events/news/using-caution-usb-drives
- https://www.bleepingcomputer.com/news/security/fbi-hackers-use-badusb-to-target-defense-firms-with-ransomware/
tags:
- attack.T1200
- attack.T1025
- attack.T1091
date: '2025-01-17'
logsource:
  category: registry_event
  product: windows
detection:
  selection_0:
    TargetObject|contains: HKLM\System\CurrentControlSet\Enum\USBSTOR\*
  selection_1:
    Details: FriendlyName
  condition: selection_0 and selection_1
