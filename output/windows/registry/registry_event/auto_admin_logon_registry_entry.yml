title: Auto Admin Logon Registry Entry
id: 1379d2b8-0f18-11ec-8ca3-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk, Steven Dick
description: The following analytic detects a suspicious registry modification that enables auto admin logon on a host. It leverages data from the Endpoint.Registry data model, specifically looking for
  changes to the "AutoAdminLogon" value within the "SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon" registry path. This activity is significant because it was observed in BlackMatter ransomware
  attacks to maintain access after a safe mode reboot, facilitating further encryption. If confirmed malicious, this could allow attackers to automatically log in and continue their operations, potentially
  leading to widespread network encryption and data loss.
references:
- https://news.sophos.com/en-us/2021/08/09/blackmatter-ransomware-emerges-from-the-shadow-of-darkside/
tags:
- attack.T1552_002
date: '2021-09-06'
logsource:
  category: registry_event
  product: windows
detection:
  selection_0:
    TargetObject|contains: '*SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon*'
  selection_1:
    Details: AutoAdminLogon
  selection_2:
    Details: 1
  condition: selection_0 and selection_1 and selection_2
