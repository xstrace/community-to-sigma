title: Windows Outlook WebView Registry Modification
id: 6e1ad5d4-d9af-496a-96ec-f31c11cd09f2
status: stable
level: medium
author: Michael Haag, Splunk
description: The following analytic identifies modifications to specific Outlook registry values related to WebView and Today features. It detects when a URL is set in these registry locations, which could
  indicate attempts to manipulate Outlook's web-based components. The analytic focuses on changes to the "URL" value within Outlook's WebView and Today registry paths. This activity is significant as it
  may represent an attacker's effort to redirect Outlook's web content or inject malicious URLs. If successful, this technique could lead to phishing attempts, data theft, or serve as a stepping stone for
  further compromise of the user's email client and potentially sensitive information.
references:
- https://gist.github.com/MHaggis/c6318acde2e2f691b550e3a491f49ff1
- https://github.com/trustedsec/specula/wiki
tags:
- attack.T1112
date: '2024-07-30'
logsource:
  category: registry_event
  product: windows
detection:
  selection_0:
    TargetObject|contains: '*\Software\Microsoft\Office\*\Outlook\WebView\*'
  selection_1:
    TargetObject|contains: '*\Software\Microsoft\Office\*\Outlook\Today'
  selection_2:
    Details: URL
  condition: selection_0 and selection_1 and selection_2
