title: Windows Modify Registry NoChangingWallPaper
id: a2276412-e254-4e9a-9082-4d92edb6a3e0
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects modifications to the Windows registry aimed at preventing wallpaper changes. It leverages data from the Endpoint.Registry datamodel, specifically monitoring changes
  to the "NoChangingWallPaper" registry value. This activity is significant as it is a known tactic used by Rhysida ransomware to enforce a malicious wallpaper, thereby limiting user control over system
  settings. If confirmed malicious, this registry change could indicate a ransomware infection, leading to further system compromise and user disruption.
references:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-319a
tags:
- attack.T1112
date: '2024-01-10'
logsource:
  category: registry_event
  product: windows
detection:
  selection_0:
    TargetObject|contains: '*\Windows\CurrentVersion\Policies\ActiveDesktop\NoChangingWallPaper'
  selection_1:
    Details: 1
  condition: selection_0 and selection_1
