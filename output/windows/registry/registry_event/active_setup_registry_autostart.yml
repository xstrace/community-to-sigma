title: Active Setup Registry Autostart
id: f64579c0-203f-11ec-abcc-acde48001122
status: stable
level: medium
author: Steven Dick, Teoderick Contreras, Splunk
description: The following analytic detects suspicious modifications to the Active Setup registry for persistence and privilege escalation. It leverages data from the Endpoint.Registry data model, focusing
  on changes to the "StubPath" value within the "SOFTWARE\\Microsoft\\Active Setup\\Installed Components" path. This activity is significant as it is commonly used by malware, adware, and APTs to maintain
  persistence on compromised machines. If confirmed malicious, this could allow attackers to execute code upon system startup, potentially leading to further system compromise and unauthorized access.
references:
- https://www.microsoft.com/en-us/wdsi/threats/malware-encyclopedia-description?Name=Backdoor%3AWin32%2FPoisonivy.E
- https://attack.mitre.org/techniques/T1547/014/
tags:
- attack.T1547_014
date: '2021-09-29'
logsource:
  category: registry_event
  product: windows
detection:
  selection_0:
    Details: StubPath
  selection_1:
    TargetObject|contains: '*\SOFTWARE\Microsoft\Active Setup\Installed Components*'
  condition: selection_0 and selection_1
