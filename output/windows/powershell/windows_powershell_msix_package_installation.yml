title: Windows PowerShell MSIX Package Installation
id: d2f77901-dbfa-42d9-8af7-dcd0f1a50a2f
status: stable
level: medium
author: Michael Haag, Splunk
description: The following analytic detects the execution of PowerShell commands to install unsigned AppX packages using Add-AppxPackage or Add-AppPackage cmdlets with the -AllowUnsigned flag. This detection
  leverages PowerShell Script Block Logging (EventCode=4104) to capture the full command content. This activity is significant as adversaries may use unsigned AppX packages to install malicious applications,
  bypass security controls, or establish persistence. If confirmed malicious, this could allow attackers to install unauthorized applications that may contain malware, backdoors, or other malicious components.
references:
- https://learn.microsoft.com/en-us/windows/msix/package/unsigned-package
- https://learn.microsoft.com/en-us/windows/msix/desktop/powershell-msix-cmdlets
- https://learn.microsoft.com/en-us/powershell/module/appx/add-appxpackage
- https://twitter.com/WindowsDocs/status/1620078135080325122
- https://attack.mitre.org/techniques/T1059/001/
- https://attack.mitre.org/techniques/T1547/001/
- https://learn.microsoft.com/en-us/powershell/module/appx/add-appxpackage?view=windowsserver2025-ps
tags:
- attack.t1059.001
- attack.t1547.001
date: '2025-08-18'
original_spl: |-
  `powershell` EventCode=4104 ScriptBlockText IN("*Add-AppPackage *", "*Add-AppxPackage *") AND ScriptBlockText IN ("* -AllowUnsigned*")
    | fillnull
    | stats count min(_time) as firstTime max(_time) as lastTime
      BY dest signature signature_id
         user_id vendor_product EventID
         Guid Opcode Name
         Path ProcessID ScriptBlockId
         ScriptBlockText
    | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)`
    | `windows_powershell_msix_package_installation_filter`
    | `windows_powershell_msix_package_installation_filter`
splunk_rule_id: d2f77901-dbfa-42d9-8af7-dcd0f1a50a2f
splunk_rule_type: TTP
logsource:
  product: windows
  service: powershell
detection:
  selection_0:
    EventID: 4104
  selection_1:
    ScriptBlockText|contains:
    - 'Add-AppPackage '
    - 'Add-AppxPackage '
  selection_2:
    ScriptBlockText|contains: ' -AllowUnsigned'
  condition: selection_0 and selection_1 and selection_2
