title: BCDEdit Failure Recovery Modification
id: 809b31d2-5462-11eb-ae93-0242ac130002
status: stable
level: medium
author: Michael Haag, Splunk
description: The following analytic detects modifications to the Windows error recovery boot configurations using bcdedit.exe with flags such as "recoveryenabled" and "no". It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names, parent processes, and command-line executions. This activity is significant because ransomware often disables recovery options to prevent
  system restoration, making it crucial for SOC analysts to investigate. If confirmed malicious, this could hinder recovery efforts, allowing ransomware to cause extensive damage and complicate remediation.
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1490/T1490.md#atomic-test-4---windows---disable-windows-recovery-console-repair
tags:
- attack.T1490
date: '2021-01-11'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: bcdedit.exe
  selection_1:
    CommandLine|contains: '*recoveryenabled*'
  selection_2:
    CommandLine|contains: '* no*'
  condition: selection_0 and selection_1 and selection_2
