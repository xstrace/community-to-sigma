title: Disable Logs Using WevtUtil
id: 236e7c8e-c9d9-11eb-a824-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the execution of "wevtutil.exe" with parameters to disable event logs. It leverages data from Endpoint Detection and Response (EDR) agents, focusing on process
  names and command-line arguments. This activity is significant because disabling event logs is a common tactic used by ransomware to evade detection and hinder forensic investigations. If confirmed malicious,
  this action could allow attackers to operate undetected, making it difficult to trace their activities and respond effectively to the incident.
references:
- https://www.bleepingcomputer.com/news/security/new-ransom-x-ransomware-used-in-texas-txdot-cyberattack/
tags:
- attack.t1685.005
date: '2021-06-10'
original_spl: |-
  | tstats `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes
    WHERE Processes.process_name = "wevtutil.exe"
      AND
      (Processes.process = "*sl*"
      OR
      Processes.process = "*set-log*" ) Processes.process IN ("*/e:false*", "*/enabled:false*")
    BY Processes.action Processes.dest Processes.original_file_name
       Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid
       Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path
       Processes.process Processes.process_exec Processes.process_guid
       Processes.process_hash Processes.process_id Processes.process_integrity_level
       Processes.process_name Processes.process_path Processes.user
       Processes.user_id Processes.vendor_product
  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | `disable_logs_using_wevtutil_filter`
splunk_rule_id: 236e7c8e-c9d9-11eb-a824-acde48001122
splunk_rule_type: TTP
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: wevtutil.exe
  selection_1:
    CommandLine|contains:
    - /e:false
    - /enabled:false
  condition: selection_0 and selection_1
