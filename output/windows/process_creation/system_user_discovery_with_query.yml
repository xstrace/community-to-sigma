title: System User Discovery With Query
id: ad03bfcf-8a91-4bc2-a500-112993deba87
status: stable
level: medium
author: Mauricio Velazco, Splunk
description: The following analytic detects the execution of `query.exe` with command-line arguments aimed at discovering logged-in users. It leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process names and command-line executions. This activity is significant as adversaries may use `query.exe` to gain situational awareness and perform Active Directory discovery on compromised
  endpoints. If confirmed malicious, this behavior could allow attackers to identify active users, aiding in further lateral movement and privilege escalation within the network.
references:
- https://attack.mitre.org/techniques/T1033/
tags:
- attack.T1033
date: '2021-08-24'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: query.exe
  selection_1:
    OriginalFileName: query.exe
  selection_2:
    CommandLine|contains: '*user*'
  condition: selection_0 and selection_1 and selection_2
