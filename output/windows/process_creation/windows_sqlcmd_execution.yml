title: Windows SQLCMD Execution
id: 4e7c2f85-8f02-4bd2-a48b-5ec98a2c5f72
status: stable
level: medium
author: Michael Haag, Splunk
description: This detection identifies potentially suspicious usage of sqlcmd.exe, focusing on command patterns that may indicate data exfiltration, reconnaissance, or malicious database operations. The
  detection looks for both short-form (-X) and long-form (--flag) suspicious parameter combinations, which have been observed in APT campaigns targeting high-value organizations. For example, threat actors
  like CL-STA-0048 have been known to abuse sqlcmd.exe for data theft and exfiltration from compromised MSSQL servers. The detection monitors for suspicious authentication attempts, output redirection,
  and potentially malicious query patterns that could indicate unauthorized database access or data theft.
references:
- https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility
- https://attack.mitre.org/techniques/T1078/
- https://attack.mitre.org/techniques/T1213/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1105/T1105.md#atomic-test-32---file-download-with-sqlcmdexe
- https://unit42.paloaltonetworks.com/espionage-campaign-targets-south-asian-entities/
tags:
- attack.T1059_003
date: '2025-02-13'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: sqlcmd.exe
  selection_1:
    OriginalFileName: sqlcmd.exe
  condition: selection_0 and selection_1
