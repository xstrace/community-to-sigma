title: Windows Impair Defense Add Xml Applocker Rules
id: 467ed9d9-8035-470e-ad5e-ae5189283033
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the use of a PowerShell commandlet to import an AppLocker XML policy. This behavior is identified by monitoring processes that execute the "Import-Module Applocker"
  and "Set-AppLockerPolicy" commands with the "-XMLPolicy" parameter. This activity is significant because it can indicate an attempt to disable or bypass security controls, as seen in the Azorult malware.
  If confirmed malicious, this could allow an attacker to disable antivirus products, leading to further compromise and persistence within the environment.
references:
- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/
tags:
- attack.t1685
date: '2022-06-28'
original_spl: |-
  | tstats `security_content_summariesonly` values(Processes.process) as process min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes
    WHERE `process_powershell`
      AND
      Processes.process="*Import-Module Applocker*"
      AND
      Processes.process="*Set-AppLockerPolicy *"
      AND
      Processes.process="* -XMLPolicy *"
    BY Processes.action Processes.dest Processes.original_file_name
       Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid
       Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path
       Processes.process Processes.process_exec Processes.process_guid
       Processes.process_hash Processes.process_id Processes.process_integrity_level
       Processes.process_name Processes.process_path Processes.user
       Processes.user_id Processes.vendor_product
  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | `windows_impair_defense_add_xml_applocker_rules_filter`
splunk_rule_id: 467ed9d9-8035-470e-ad5e-ae5189283033
splunk_rule_type: Hunting
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: Import-Module Applocker
  selection_1:
    CommandLine|contains: 'Set-AppLockerPolicy '
  selection_2:
    CommandLine|contains: ' -XMLPolicy '
  condition: selection_0 and selection_1 and selection_2
