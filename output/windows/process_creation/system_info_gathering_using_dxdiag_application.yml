title: System Info Gathering Using Dxdiag Application
id: f92d74f2-4921-11ec-b685-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic identifies the execution of the dxdiag.exe process with specific command-line arguments, which is used to gather system information. This detection leverages data from
  Endpoint Detection and Response (EDR) agents, focusing on process creation events and command-line details. This activity is significant because dxdiag.exe is rarely used in corporate environments and
  its execution may indicate reconnaissance efforts by malicious actors. If confirmed malicious, this activity could allow attackers to collect detailed system information, aiding in further exploitation
  or lateral movement within the network.
references:
- https://app.any.run/tasks/df0baf9f-8baf-4c32-a452-16562ecb19be/
tags:
- attack.T1592
date: '2021-11-19'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: dxdiag.exe
  selection_1:
    OriginalFileName: dxdiag.exe
  selection_2:
    CommandLine|contains: '* /t *'
  condition: selection_0 and selection_1 and selection_2
