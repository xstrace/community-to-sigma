title: Windows Process Commandline Discovery
id: 67d2a52e-a7e2-4a5d-ae44-a21212048bc2
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the use of Windows Management Instrumentation Command-line (WMIC) to retrieve information about running processes, specifically targeting the command lines used
  to launch those processes. This detection leverages data from Endpoint Detection and Response (EDR) agents, focusing on logs containing process details and command-line executions. This activity is significant
  as it may indicate suspicious behavior, such as a user or process gathering detailed process information, which is uncommon for non-technical users. If confirmed malicious, this could allow an attacker
  to gain insights into running processes, aiding in further exploitation or lateral movement.
references:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-347a
tags:
- attack.T1057
date: '2021-08-24'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: '* process *'
  selection_1:
    CommandLine|contains: '* get *'
  selection_2:
    CommandLine|contains: '*CommandLine*'
  condition: selection_0 and selection_1 and selection_2
