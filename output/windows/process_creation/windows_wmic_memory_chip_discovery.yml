title: Windows Wmic Memory Chip Discovery
id: aecaddaa-5885-4e44-a724-1edd5ecbc79f
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the execution of Windows Management Instrumentation Command-line (WMIC) commands related to memory chip discovery on a Windows system. Specifically, it monitors
  instances where commands such as “wmic memorychip” are used to retrieve detailed information about installed RAM modules. While these commands can serve legitimate administrative and troubleshooting purposes,
  they may also be employed by adversaries to gather system hardware specifications as part of their reconnaissance activities. By identifying and alerting on WMIC memory chip queries, security teams can
  enhance their ability to spot unauthorized information gathering and take proactive measures to mitigate potential threats.
references:
- https://cert.gov.ua/article/6284730
tags:
- attack.T1082
date: '2021-05-07'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: '* memorychip*'
  condition: selection_0
