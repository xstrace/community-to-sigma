title: Windows Global Object Access Audit List Cleared Via Auditpol
id: 802a0930-0a4a-4451-bf6c-6366c6b6d9e7
status: stable
level: medium
author: Nasreddine Bencherchali, Splunk
description: The following analytic identifies the execution of `auditpol.exe` with the "/resourceSACL" flag, and either the "/clear" or "/remove" command-line arguments used to remove or clear the global
  object access audit policy. It leverages data from Endpoint Detection and Response (EDR) agents, focusing on process names and command-line executions. This activity can be significant as it indicates
  potential defense evasion by adversaries or Red Teams, aiming to limit data that can be leveraged for detections and audits. If confirmed malicious, this behavior could allow attackers to bypass defenses,
  and plan further attacks, potentially leading to full machine compromise or lateral movement.
references:
- https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/auditpol-resourcesacl
tags:
- attack.t1685.001
date: '2025-02-19'
original_spl: |-
  | tstats `security_content_summariesonly` min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes
    WHERE `process_auditpol` Processes.process="*/resourceSACL*" Processes.process IN ("*/clear*", "*/remove*")
      AND
      NOT Processes.process="*/?*"
    BY Processes.action Processes.dest Processes.original_file_name
       Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid
       Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path
       Processes.process Processes.process_exec Processes.process_guid
       Processes.process_hash Processes.process_id Processes.process_integrity_level
       Processes.process_name Processes.process_path Processes.user
       Processes.user_id Processes.vendor_product
  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | `windows_global_object_access_audit_list_cleared_via_auditpol_filter`
splunk_rule_id: 802a0930-0a4a-4451-bf6c-6366c6b6d9e7
splunk_rule_type: TTP
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: /resourceSACL
  selection_1:
    CommandLine|contains:
    - /clear
    - /remove
  filter_2:
    CommandLine|contains: '*/?*'
  condition: (selection_0 and selection_1) and not (filter_2)
