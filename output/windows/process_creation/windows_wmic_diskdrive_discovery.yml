title: Windows Wmic DiskDrive Discovery
id: 85e88c80-e4ee-4c65-b02e-3c54d94c7a51
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the use of Windows Management Instrumentation Command-line (WMIC) for disk drive discovery activities on a Windows system. This process involves monitoring commands
  such as “wmic diskdrive” which are often used by administrators for inventory and diagnostics but can also be leveraged by attackers to enumerate hardware details for malicious purposes. Detecting these
  commands is essential for identifying potentially unauthorized asset reconnaissance or pre-attack mapping behaviors. By capturing and analyzing WMIC disk drive queries, security teams can gain visibility
  into suspicious activities, enabling them to respond promptly and strengthen the organization’s security posture against insider threats or lateral movement attempts.
references:
- https://cert.gov.ua/article/6284730
tags:
- attack.T1082
date: '2021-05-07'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: '* diskdrive*'
  condition: selection_0
