title: Windows Domain Account Discovery Via Get-NetComputer
id: a7fbbc4e-4571-424a-b627-6968e1c939e4
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the execution of the PowerView PowerShell cmdlet Get-NetComputer, which is used to query Active Directory for user account details such as "samaccountname," "accountexpires,"
  "lastlogon," and more. It leverages Event ID 4104 from PowerShell Script Block Logging to identify this activity. This behavior is significant as it may indicate an attempt to gather user account information,
  which is often a precursor to further malicious actions. If confirmed malicious, this activity could lead to unauthorized access, privilege escalation, or lateral movement within the network.
references:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-347a
tags:
- attack.T1087_002
date: '2024-01-10'
logsource:
  product: windows
  service: powershell
detection:
  selection_0:
    EventID: 4104
  selection_1:
    ScriptBlockText|contains: '*Get-NetComputer*'
  selection_2:
    ScriptBlockText|contains:
    - '*samaccountname*'
    - '*accountexpires*'
    - '*lastlogon*'
    - '*lastlogoff*'
    - '*pwdlastset*'
    - '*logoncount*'
  condition: selection_0 and selection_1 and selection_2
