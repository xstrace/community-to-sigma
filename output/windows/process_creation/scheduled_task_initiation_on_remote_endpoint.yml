title: Scheduled Task Initiation on Remote Endpoint
id: 95cf4608-4302-11ec-8194-3e22fbd008af
status: stable
level: medium
author: Mauricio Velazco, Splunk, Badoodish, Github Community
description: The following analytic detects the use of 'schtasks.exe' to start a Scheduled Task on a remote endpoint. This detection leverages Endpoint Detection and Response (EDR) data, focusing on process
  details such as process name, parent process, and command-line executions. This activity is significant as adversaries often abuse Task Scheduler for lateral movement and remote code execution. If confirmed
  malicious, this behavior could allow attackers to execute arbitrary code remotely, potentially leading to further compromise of the network.
references:
- https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/schtasks
- https://attack.mitre.org/techniques/T1053/005/
tags:
- attack.T1053_005
date: '2021-11-11'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: schtasks.exe
  selection_1:
    OriginalFileName: schtasks.exe
  selection_2:
    CommandLine|contains: '* /S *'
  selection_3:
    CommandLine|contains: '*/run*'
  condition: selection_0 and selection_1 and selection_2 and selection_3
