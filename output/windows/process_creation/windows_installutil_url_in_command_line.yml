title: Windows InstallUtil URL in Command Line
id: 28e06670-43df-11ec-a569-acde48001122
status: stable
level: medium
author: Michael Haag, Splunk
description: The following analytic detects the use of Windows InstallUtil.exe with an HTTP or HTTPS URL in the command line. This is identified through Endpoint Detection and Response (EDR) telemetry,
  focusing on command-line executions containing URLs. This activity is significant as it may indicate an attempt to download and execute malicious code, potentially bypassing application control mechanisms.
  If confirmed malicious, this could lead to unauthorized code execution, privilege escalation, or persistent access within the environment. Analysts should review the parent process, network connections,
  file modifications, and related processes for further investigation.
references:
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.004/T1218.004.md
- https://gist.github.com/DanielRTeixeira/0fd06ec8f041f34a32bf5623c6dd479d
tags:
- attack.T1218_004
date: '2021-11-12'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains:
    - '*http://*'
    - '*https://*'
  condition: selection_0
