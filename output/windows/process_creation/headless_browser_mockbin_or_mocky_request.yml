title: Headless Browser Mockbin or Mocky Request
id: 94fc85a1-e55b-4265-95e1-4b66730e05c0
status: stable
level: medium
author: Michael Haag, Splunk
description: The following analytic detects headless browser activity accessing mockbin.org or mocky.io. It identifies processes with the "--headless" and "--disable-gpu" command line arguments, along with
  references to mockbin.org or mocky.io. This behavior is significant as headless browsers are often used for automated tasks, including malicious activities like web scraping or automated attacks. If confirmed
  malicious, this activity could indicate an attempt to bypass traditional browser security measures, potentially leading to data exfiltration or further exploitation of web applications.
references:
- https://mockbin.org/
- https://www.mocky.io/
tags:
- attack.T1564_003
date: '2023-09-11'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: '*--headless*'
  selection_1:
    CommandLine|contains: '*--disable-gpu*'
  condition: selection_0 and selection_1
