title: Credential Dumping via Copy Command from Shadow Copy
id: d8c406fe-23d2-45f3-a983-1abe7b83ff3b
status: stable
level: medium
author: Patrick Bareiss, Splunk
description: The following analytic detects the use of the copy command to dump credentials from a shadow copy. It leverages Endpoint Detection and Response (EDR) data to identify processes with command
  lines referencing critical files like "sam", "security", "system", and "ntds.dit" in system directories. This activity is significant as it indicates an attempt to extract credentials, a common technique
  for unauthorized access and privilege escalation. If confirmed malicious, this could lead to attackers gaining sensitive login information, escalating privileges, moving laterally within the network,
  or accessing sensitive data.
references:
- https://2017.zeronights.org/wp-content/uploads/materials/ZN17_Kheirkhabarov_Hunting_for_Credentials_Dumping_in_Windows_Environment.pdf
tags:
- attack.T1003_003
date: '2020-04-29'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: '*\system32\config\sam*'
  selection_1:
    CommandLine|contains: '*\system32\config\security*'
  selection_2:
    CommandLine|contains: '*\system32\config\system*'
  selection_3:
    CommandLine|contains: '*\windows\ntds\ntds.dit*'
  condition: selection_0 and selection_1 and selection_2 and selection_3
