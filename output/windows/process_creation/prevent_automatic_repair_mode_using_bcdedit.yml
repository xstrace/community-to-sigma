title: Prevent Automatic Repair Mode using Bcdedit
id: 7742aa92-c9d9-11eb-bbfc-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the execution of "bcdedit.exe" with parameters to set the boot status policy to ignore all failures. It leverages data from Endpoint Detection and Response (EDR)
  agents, focusing on process names and command-line arguments. This activity is significant because it can indicate an attempt by ransomware to prevent a compromised machine from booting into automatic
  repair mode, thereby hindering recovery efforts. If confirmed malicious, this action could allow attackers to maintain control over the infected system, complicating remediation and potentially leading
  to further damage.
references:
- https://jsac.jpcert.or.jp/archive/2020/pdf/JSAC2020_1_tamada-yamazaki-nakatsuru_en.pdf
tags:
- attack.T1490
date: '2021-06-10'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: bcdedit.exe
  selection_1:
    CommandLine|contains: '*bootstatuspolicy*'
  selection_2:
    CommandLine|contains: '*ignoreallfailures*'
  condition: selection_0 and selection_1 and selection_2
