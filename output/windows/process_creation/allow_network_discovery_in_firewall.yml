title: Allow Network Discovery In Firewall
id: ccd6a38c-d40b-11eb-85a5-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects a suspicious modification to the firewall to allow network discovery on a machine. It leverages data from Endpoint Detection and Response (EDR) agents, focusing
  on command-line executions involving the 'netsh' command to enable network discovery. This activity is significant because it is commonly used by ransomware, such as REvil and RedDot, to discover and
  compromise additional machines on the network. If confirmed malicious, this could lead to widespread file encryption across multiple hosts, significantly amplifying the impact of the ransomware attack.
references:
- https://community.fortinet.com:443/t5/FortiEDR/How-FortiEDR-detects-and-blocks-Revil-Ransomware-aka-sodinokibi/ta-p/189638?externalID=FD52469
- https://app.any.run/tasks/c0f98850-af65-4352-9746-fbebadee4f05/
tags:
- attack.T1686_001
date: '2021-06-23'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: '*firewall*'
  selection_1:
    CommandLine|contains: '*group=\"Network Discovery\"*'
  selection_2:
    CommandLine|contains: '*enable*'
  selection_3:
    CommandLine|contains: '*Yes*'
  condition: selection_0 and selection_1 and selection_2 and selection_3
