title: Windows AD DSRM Password Reset
id: d1ab841c-36a6-46cf-b50f-b2b04b31182a
status: stable
level: medium
author: Dean Luxton
description: The following analytic detects attempts to reset the Directory Services Restore Mode (DSRM) administrator password on a Domain Controller. It leverages event code 4794 from the Windows Security
  Event Log, specifically looking for events where the DSRM password reset is attempted. This activity is significant because the DSRM account can be used similarly to a local administrator account, providing
  potential persistence for an attacker. If confirmed malicious, this could allow an attacker to maintain administrative access to the Domain Controller, posing a severe risk to the domain's security.
references:
- https://adsecurity.org/?p=1714
tags:
- attack.T1098
date: '2022-09-08'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    result_id: '4794'
  selection_1:
    Result: set the Directory Services Restore Mode administrator password
  condition: selection_0 and selection_1
