title: Windows Disable or Stop Browser Process
id: 220d34b7-b6c7-45fe-8dbb-c35cdd9fe6d5
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the use of the taskkill command in a process command line to terminate several known browser processes, a technique commonly employed by the Braodo stealer malware
  to steal credentials. By forcefully closing browsers like Chrome, Edge, and Firefox, the malware can unlock files that store sensitive information, such as passwords and login data. This detection focuses
  on identifying taskkill commands targeting these browsers, signaling malicious intent. Early detection allows security teams to investigate and prevent further credential theft and system compromise.
references:
- https://x.com/suyog41/status/1825869470323056748
- https://g0njxa.medium.com/from-vietnam-to-united-states-malware-fraud-and-dropshipping-98b7a7b2c36d
tags:
- attack.T1685
date: '2024-10-18'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: '*taskkill*'
  selection_1:
    CommandLine|contains:
    - '*chrome.exe'
    - '*firefox.exe'
    - '*brave.exe'
    - '*opera.exe'
    - '*msedge.exe'
    - '*chromium.exe'
  condition: selection_0 and selection_1
