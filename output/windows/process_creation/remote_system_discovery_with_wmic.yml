title: Remote System Discovery with Wmic
id: d82eced3-b1dc-42ab-859e-a2fc98827359
status: stable
level: medium
author: Mauricio Velazco, Splunk
description: The following analytic detects the execution of `wmic.exe` with specific command-line arguments used to discover remote systems within a domain. It leverages data from Endpoint Detection and
  Response (EDR) agents, focusing on process names and command-line executions. This activity is significant as it indicates potential reconnaissance efforts by adversaries to map out network resources
  and Active Directory structures. If confirmed malicious, this behavior could allow attackers to gain situational awareness, identify critical systems, and plan further attacks, potentially leading to
  unauthorized access and data exfiltration.
references:
- https://attack.mitre.org/techniques/T1018/
- https://docs.microsoft.com/en-us/windows/win32/wmisdk/wmic
tags:
- attack.T1018
date: '2021-09-01'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: wmic.exe
  selection_1:
    CommandLine|contains: '*/NAMESPACE:\\root\directory\ldap*'
  selection_2:
    CommandLine|contains: '*ds_computer*'
  selection_3:
    CommandLine|contains: '*GET ds_samaccountname*'
  condition: selection_0 and selection_1 and selection_2 and selection_3
