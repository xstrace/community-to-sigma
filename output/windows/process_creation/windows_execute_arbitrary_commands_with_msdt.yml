title: Windows Execute Arbitrary Commands with MSDT
id: e1d5145f-38fe-42b9-a5d5-457796715f97
status: stable
level: medium
author: Michael Haag, Teoderick Contreras, Splunk
description: The following analytic detects arbitrary command execution using Windows msdt.exe, a Diagnostics Troubleshooting Wizard. It leverages Endpoint Detection and Response (EDR) data to identify
  instances where msdt.exe is invoked via the ms-msdt:/ protocol handler to retrieve a remote payload. This activity is significant as it can indicate an exploitation attempt leveraging msdt.exe to execute
  arbitrary commands, potentially leading to unauthorized code execution. If confirmed malicious, this could allow an attacker to execute arbitrary code, escalate privileges, or persist within the environment,
  posing a severe security risk.
references:
- https://isc.sans.edu/diary/rss/28694
- https://doublepulsar.com/follina-a-microsoft-office-code-execution-vulnerability-1a47fce5629e
- https://twitter.com/nao_sec/status/1530196847679401984?s=20&t=ZiXYI4dQuA-0_dzQzSUb3A
- https://app.any.run/tasks/713f05d2-fe78-4b9d-a744-f7c133e3fafb/
- https://www.virustotal.com/gui/file/4a24048f81afbe9fb62e7a6a49adbd1faf41f266b5f9feecdceb567aec096784/detection
- https://strontic.github.io/xcyclopedia/library/msdt.exe-152D4C9F63EFB332CCB134C6953C0104.html
tags:
- attack.T1218
date: '2022-05-30'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: msdt.exe
  selection_1:
    CommandLine|contains:
    - '*msdt*'
    - '*ms-msdt:*'
    - '*ms-msdt:/id*'
    - '*ms-msdt:-id*'
    - '*/id*'
  selection_2:
    CommandLine|contains: '*PCWDiagnostic*'
  condition: selection_0 and selection_1 and selection_2
