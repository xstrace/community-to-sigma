title: Disabling Firewall with Netsh
id: 6860a62c-9203-11eb-9e05-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic identifies the disabling of the firewall using the netsh application. It leverages data from Endpoint Detection and Response (EDR) agents, focusing on command-line executions
  that include keywords like "firewall," "off," or "disable." This activity is significant because disabling the firewall can expose the system to external threats, allowing malware to communicate with
  its command and control (C2) server. If confirmed malicious, this action could lead to unauthorized data exfiltration, further malware downloads, and broader network compromise.
references:
- https://tccontre.blogspot.com/2020/01/remcos-rat-evading-windows-defender-av.html
tags:
- attack.T1685
date: '2021-03-31'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: '*firewall*'
  selection_1:
    CommandLine|contains: '*off*'
  selection_2:
    CommandLine|contains: '*disable*'
  condition: selection_0 and selection_1 and selection_2
