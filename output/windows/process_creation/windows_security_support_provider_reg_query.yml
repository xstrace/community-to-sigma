title: Windows Security Support Provider Reg Query
id: 31302468-93c9-4eca-9ae3-2d41f53a4e2b
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic identifies command-line activity querying the registry for Security Support Providers (SSPs) related to Local Security Authority (LSA) protection and configuration. This
  detection leverages Endpoint Detection and Response (EDR) telemetry, focusing on processes accessing specific LSA registry paths. Monitoring this activity is crucial as adversaries and post-exploitation
  tools like winpeas may use it to gather information on LSA protections, potentially leading to credential theft. If confirmed malicious, attackers could exploit this to scrape password hashes or plaintext
  passwords from memory, significantly compromising system security.
references:
- https://blog.netwrix.com/2022/01/11/understanding-lsa-protection/
- https://github.com/carlospolop/PEASS-ng/tree/master/winPEAS
- https://www.microsoft.com/en-us/security/blog/2022/10/14/new-prestige-ransomware-impacts-organizations-in-ukraine-and-poland/
tags:
- attack.T1547_005
date: '2022-12-06'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: '* query *'
  selection_1:
    CommandLine|contains: '*\SYSTEM\CurrentControlSet\Control\LSA*'
  selection_2:
    CommandLine|contains:
    - '*RunAsPPL*'
    - '*LsaCfgFlags*'
  condition: selection_0 and selection_1 and selection_2
