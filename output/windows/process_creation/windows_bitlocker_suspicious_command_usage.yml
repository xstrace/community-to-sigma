title: Windows BitLocker Suspicious Command Usage
id: d0e6ec70-6e40-41a2-8b93-8d9ff077a746
status: stable
level: medium
author: Steven Dick
description: This analytic is developed to detect the usage of BitLocker commands used to disable or impact boot settings. The malware ShrinkLocker uses various commands change how BitLocker handles encryption,
  potentially bypassing TPM requirements, enabling BitLocker without TPM, and enforcing specific startup key and PIN configurations. Such modifications can weaken system security, making it easier for unauthorized
  access and data breaches. Detecting these changes is crucial for maintaining robust encryption and data protection.
references:
- https://attack.mitre.org/techniques/T1486/
- https://www.nccgroup.com/us/research-blog/nameless-and-shameless-ransomware-encryption-via-bitlocker/
- https://www.bitdefender.com/en-us/blog/businessinsights/shrinklocker-decryptor-from-friend-to-foe-and-back-again
- https://www.bleepingcomputer.com/news/security/new-shrinklocker-ransomware-uses-bitlocker-to-encrypt-your-files/
tags:
- attack.T1486
- attack.T1490
date: '2025-02-10'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: manage-bde.exe
  selection_1:
    CommandLine|contains:
    - '* -protectors -disable *'
    - '* -protectors -delete *'
    - '* -forcerecovery *'
    - '* -lock *'
  condition: selection_0 and selection_1
