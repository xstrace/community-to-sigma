title: Unload Sysmon Filter Driver
id: e5928ff3-23eb-4d8b-b8a4-dcbc844fdfbe
status: stable
level: medium
author: Bhavin Patel, Splunk
description: The following analytic detects the use of `fltMC.exe` to unload the Sysmon driver, which stops Sysmon from collecting data. It leverages Endpoint Detection and Response (EDR) logs, focusing
  on process names and command-line executions. This activity is significant because disabling Sysmon can blind security monitoring, allowing malicious actions to go undetected. If confirmed malicious,
  this could enable attackers to execute further attacks without being logged, leading to potential data breaches, privilege escalation, or persistent access within the environment.
references:
- https://www.ired.team/offensive-security/defense-evasion/unloading-sysmon-driver
tags:
- attack.T1685
date: '2019-10-16'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: fltMC.exe
  selection_1:
    CommandLine|contains: '*unload*'
  selection_2:
    CommandLine|contains: '*SysmonDrv*'
  condition: selection_0 and selection_1 and selection_2
