title: Windows Masquerading Msdtc Process
id: 238f3a07-8440-480b-b26f-462f41d9a47c
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic identifies the execution of msdtc.exe with specific command-line parameters (-a or -b), which are indicative of the PlugX malware. This detection leverages data from
  Endpoint Detection and Response (EDR) agents, focusing on process names and command-line arguments. This activity is significant because PlugX uses these parameters to masquerade its malicious operations
  within legitimate processes, making it harder to detect. If confirmed malicious, this behavior could allow attackers to gain unauthorized access, exfiltrate data, and conduct espionage, severely compromising
  the affected system.
references:
- https://malpedia.caad.fkie.fraunhofer.de/details/win.plugx
tags:
- attack.t1036
date: '2023-12-06'
original_spl: |-
  | tstats `security_content_summariesonly` min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes
    WHERE Processes.process_name = "msdtc.exe" Processes.process = "*msdtc.exe*" Processes.process IN ("* -a*", "* -b*")
    BY Processes.action Processes.dest Processes.original_file_name
       Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid
       Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path
       Processes.process Processes.process_exec Processes.process_guid
       Processes.process_hash Processes.process_id Processes.process_integrity_level
       Processes.process_name Processes.process_path Processes.user
       Processes.user_id Processes.vendor_product
  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | `windows_masquerading_msdtc_process_filter`
splunk_rule_id: 238f3a07-8440-480b-b26f-462f41d9a47c
splunk_rule_type: TTP
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: msdtc.exe
  selection_1:
    CommandLine|contains: msdtc.exe
  selection_2:
    CommandLine|contains:
    - ' -a'
    - ' -b'
  condition: selection_0 and selection_1 and selection_2
