title: Windows TeamCity Payload Execution from Temp Directory
id: 937c59be-0975-4097-ae45-f07c894f9ff4
status: stable
level: medium
author: Raven Tait, Splunk
description: |-
  Detects the bundled TeamCity java executing a payload out of the temp directory.
  This activity can be associated with a malicious plugin installed by metasploit for remote code execution.
references:
- https://thehackernews.com/2024/03/critical-jetbrains-teamcity-on-premises.html
- https://github.com/sfewer-r7/metasploit-framework/blob/CVE-2024-27198/modules/exploits/multi/http/jetbrains_teamcity_rce_cve_2024_27198.rb
- https://www.rapid7.com/blog/post/2024/03/04/etr-cve-2024-27198-and-cve-2024-27199-jetbrains-teamcity-multiple-authentication-bypass-vulnerabilities-fixed/
tags:
- attack.t1190
- attack.t1505.003
- attack.t1059
date: '2026-05-05'
original_spl: |-
  | tstats `security_content_summariesonly`
    count min(_time) as firstTime
          max(_time) as lastTime

  from datamodel=Endpoint.Processes where

  Processes.process="*-classpath *"
  Processes.process="*:\\Windows\\TEMP\\~spawn*"
  Processes.process="*.tmp.dir *"
  Processes.process="*.Payload*"
  Processes.process="*TeamCity*"

  by Processes.process Processes.vendor_product Processes.user_id Processes.process_hash
     Processes.parent_process_name Processes.parent_process_exec Processes.action
     Processes.dest Processes.process_current_directory Processes.process_path
     Processes.process_integrity_level Processes.original_file_name
     Processes.parent_process Processes.parent_process_path
     Processes.parent_process_guid Processes.parent_process_id
     Processes.process_guid Processes.process_id
     Processes.user Processes.process_name

  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | `windows_teamcity_payload_execution_from_temp_directory_filter`
splunk_rule_id: 937c59be-0975-4097-ae45-f07c894f9ff4
splunk_rule_type: TTP
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: '-classpath '
  selection_1:
    CommandLine|contains: :\Windows\TEMP\~spawn
  selection_2:
    CommandLine|contains: '.tmp.dir '
  selection_3:
    CommandLine|contains: .Payload
  selection_4:
    CommandLine|contains: TeamCity
  condition: selection_0 and selection_1 and selection_2 and selection_3 and selection_4
