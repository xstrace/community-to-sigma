title: Mailsniper Invoke functions
id: a36972c8-b894-11eb-9f78-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the execution of known MailSniper PowerShell functions on a machine. It leverages PowerShell logs (EventCode 4104) to identify specific script block text associated
  with MailSniper activities. This behavior is significant as MailSniper is often used by attackers to harvest sensitive emails from compromised Exchange servers. If confirmed malicious, this activity could
  lead to unauthorized access to sensitive email data, credential theft, and further compromise of the email infrastructure.
references:
- https://www.blackhillsinfosec.com/introducing-mailsniper-a-tool-for-searching-every-users-email-for-sensitive-data/
tags:
- attack.T1114_001
date: '2021-05-19'
logsource:
  product: windows
  service: powershell
detection:
  selection_0:
    EventID: 4104
  selection_1:
    ScriptBlockText|contains:
    - '*Invoke-GlobalO365MailSearch*'
    - '*Invoke-GlobalMailSearch*'
    - '*Invoke-SelfSearch*'
    - '*Invoke-PasswordSprayOWA*'
    - '*Invoke-PasswordSprayEWS*'
    - '*Invoke-DomainHarvestOWA*'
    - '*Invoke-UsernameHarvestOWA*'
    - '*Invoke-OpenInboxFinder*'
    - '*Invoke-InjectGEventAPI*'
    - '*Invoke-InjectGEvent*'
    - '*Invoke-SearchGmail*'
    - '*Invoke-MonitorCredSniper*'
    - '*Invoke-AddGmailRule*'
    - '*Invoke-PasswordSprayEAS*'
    - '*Invoke-UsernameHarvestEAS*'
  condition: selection_0 and selection_1
