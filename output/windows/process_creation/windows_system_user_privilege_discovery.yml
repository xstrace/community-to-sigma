title: Windows System User Privilege Discovery
id: 8c9a06bc-9939-4425-9bb9-be2371f7fb7e
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the execution of `whoami.exe` with the `/priv` parameter, which displays the privileges assigned to the current user account. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names and command-line executions. This activity is significant as it may indicate an adversary attempting to enumerate user privileges, a common
  step in the reconnaissance phase of an attack. If confirmed malicious, this could lead to privilege escalation or further exploitation within the environment.
references:
- https://attack.mitre.org/techniques/T1033/
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-347a
tags:
- attack.T1033
date: '2021-08-24'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: whoami.exe
  selection_1:
    CommandLine|contains: '*/priv*'
  condition: selection_0 and selection_1
