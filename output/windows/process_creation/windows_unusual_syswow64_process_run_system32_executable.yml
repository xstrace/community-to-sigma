title: Windows Unusual SysWOW64 Process Run System32 Executable
id: e4602172-db86-4315-86df-da66fb40bcde
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects an unusual process execution pattern where a process running from C:\Windows\SysWOW64\ attempts to execute a binary from C:\Windows\System32\. In a typical Windows
  environment, 32-bit processes under SysWOW64 should primarily interact with 32-bit binaries within the same directory. However, an execution flow where a 32-bit process spawns a 64-bit binary from System32
  can indicate potential process injection, privilege escalation, evasion techniques, or unauthorized execution hijacking.
references:
- https://www.trendmicro.com/en_nl/research/24/k/earth-estries.html
tags:
- attack.T1036_009
date: '2022-12-06'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image|contains: '*\Windows\SysWOW64\*'
  selection_1:
    CommandLine|contains: '*windows\system32\*'
  condition: selection_0 and selection_1
