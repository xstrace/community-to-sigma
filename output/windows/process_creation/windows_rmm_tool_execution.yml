    - AnyDesk*
    - Ammyy Admin*
    - AteraAgent*
    - BeyondTrust Remote Support*
    - FleetDeck*
    - GoToAssist*
    - GoToMyPC*
    - Kaseya Live Connect*
    - NetSupport Remote Control*
    - NetSupport Manager*
    - NinjaRMM*
    - Pulseway*
    - Remote Access*
    - Remote Support*
