title: Permission Modification using Takeown App
id: fa7ca5c6-c9d8-11eb-bce9-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the modification of file or directory permissions using the takeown.exe Windows application. It leverages data from Endpoint Detection and Response (EDR) agents,
  focusing on process execution logs that include process GUID, process name, and command-line details. This activity is significant because it is a common technique used by ransomware to take ownership
  of files or folders for encryption or deletion. If confirmed malicious, this could lead to unauthorized access, data encryption, or data destruction, severely impacting the integrity and availability
  of critical data.
references:
- https://research.nccgroup.com/2020/06/23/wastedlocker-a-new-ransomware-variant-developed-by-the-evil-corp-group/
tags:
- attack.T1222
date: '2021-06-10'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: takeown.exe
  selection_1:
    CommandLine|contains: '*/f*'
  condition: selection_0 and selection_1
