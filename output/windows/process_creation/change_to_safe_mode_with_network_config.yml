title: Change To Safe Mode With Network Config
id: 81f1dce0-0f18-11ec-a5d7-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the execution of a suspicious `bcdedit` command that configures a host to boot in safe mode with network support. It leverages data from Endpoint Detection and
  Response (EDR) agents, focusing on command-line executions involving `bcdedit.exe` with specific parameters. This activity is significant because it is a known technique used by BlackMatter ransomware
  to force a compromised host into safe mode for continued encryption. If confirmed malicious, this could allow attackers to bypass certain security controls, persist in the environment, and continue their
  malicious activities.
references:
- https://news.sophos.com/en-us/2021/08/09/blackmatter-ransomware-emerges-from-the-shadow-of-darkside/
tags:
- attack.T1490
date: '2021-09-07'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: bcdedit.exe
  selection_1:
    CommandLine|contains: '*/set*'
  selection_2:
    CommandLine|contains: '*{current}*'
  selection_3:
    CommandLine|contains: '*safeboot*'
  selection_4:
    CommandLine|contains: '*network*'
  condition: selection_0 and selection_1 and selection_2 and selection_3 and selection_4
