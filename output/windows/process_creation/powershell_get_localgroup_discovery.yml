title: PowerShell Get LocalGroup Discovery
id: b71adfcc-155b-11ec-9413-acde48001122
status: stable
level: medium
author: Michael Haag, Splunk
description: The following analytic identifies the use of the `get-localgroup` command executed via PowerShell or cmd.exe to enumerate local groups on an endpoint. This detection leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process names and command-line arguments. Monitoring this activity is significant as it may indicate an attacker attempting to gather information about
  local group memberships, which can be a precursor to privilege escalation. If confirmed malicious, this activity could allow an attacker to identify and target privileged accounts, potentially leading
  to unauthorized access and control over the system.
references:
- https://attack.mitre.org/techniques/T1069/001/
- https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1069.001/T1069.001.md
tags:
- attack.T1069_001
date: '2021-09-14'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: powershell.exe
  selection_1:
    Image: cmd.exe
  selection_2:
    CommandLine|contains: '*get-localgroup*'
  condition: selection_0 and selection_1 and selection_2
