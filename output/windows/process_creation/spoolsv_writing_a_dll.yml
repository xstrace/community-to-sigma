title: Spoolsv Writing a DLL
id: d5bf5cf2-da71-11eb-92c2-acde48001122
status: stable
level: medium
author: Mauricio Velazco, Michael Haag, Splunk
description: The following analytic detects `spoolsv.exe` writing a `.dll` file, which is unusual behavior and may indicate exploitation of vulnerabilities like CVE-2021-34527 (PrintNightmare). This detection
  leverages the Endpoint datamodel, specifically monitoring process and filesystem events to identify `.dll` file creation within the `\spool\drivers\x64\` path. This activity is significant as it may signify
  an attacker attempting to execute malicious code via the Print Spooler service. If confirmed malicious, this could lead to unauthorized code execution and potential system compromise. Immediate endpoint
  isolation and further investigation are recommended.
