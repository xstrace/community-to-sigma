title: Windows Privilege Escalation Attempt Via MSI Rollback
id: f40a5edd-8086-4ad8-868a-805270e9b167
status: stable
level: medium
author: Raven Tait, Splunk
description: |-
  Detects an attacker abusing the Windows Installer rollback mechanism to escalate privileges from a standard user to SYSTEM without triggering a UAC prompt, using a technique known as FolderContentsDeleteToFolderDelete.
  Windows Installer (msiexec.exe) creates rollback scripts during software installation to undo changes if an installation fails.
  These rollback scripts are generated and executed by the Windows Installer service, which runs as SYSTEM.
  The FolderContentsDeleteToFolderDelete technique abuses this trusted mechanism by crafting a malicious rollback script that instructs the SYSTEM-level Installer service to delete attacker-chosen files or directories — effectively giving a low-privileged attacker the ability to make SYSTEM-level filesystem modifications without any privilege prompt.
references:
- https://github.com/mbog14/CVE-2024-44193
tags:
- attack.t1068
date: '2026-05-05'
original_spl: |-
  | tstats `security_content_summariesonly`
    count min(_time) as firstTime
          max(_time) as lastTime

  from datamodel=Endpoint.Processes where

  Processes.process="*/target \"C:\\Config.msi\" *"
  Processes.process="*/initial*"

  by Processes.process Processes.vendor_product Processes.user_id Processes.process_hash
     Processes.parent_process_name Processes.parent_process_exec Processes.action
     Processes.dest Processes.process_current_directory Processes.process_path
     Processes.process_integrity_level Processes.original_file_name Processes.parent_process
     Processes.parent_process_path Processes.parent_process_guid Processes.parent_process_id
     Processes.process_guid Processes.process_id Processes.user Processes.process_name

  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | `windows_privilege_escalation_attempt_via_msi_rollback_filter`
splunk_rule_id: f40a5edd-8086-4ad8-868a-805270e9b167
splunk_rule_type: TTP
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: '/target \"C:\Config.msi\" '
  selection_1:
    CommandLine|contains: /initial
  condition: selection_0 and selection_1
