title: Windows MSTSC RDP Commandline
id: 3718549b-867e-4084-b770-790e8dab6ab8
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the use of the mstsc.exe command-line, which is commonly used to initiate Remote Desktop Protocol (RDP) connections. This detection focuses on instances where
  mstsc.exe is executed with specific parameters that may indicate suspicious or unauthorized remote access attempts. Monitoring command-line arguments such as /v:<target> for direct connections or /admin
  for administrative sessions can help identify potential misuse or lateral movement within a network.
references:
- https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-071a
tags:
- attack.T1021_001
date: '2021-09-02'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: mstsc.exe
  selection_1:
    CommandLine|contains: '*/v:*'
  condition: selection_0 and selection_1
