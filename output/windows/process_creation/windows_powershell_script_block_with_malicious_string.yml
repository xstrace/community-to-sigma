title: Windows PowerShell Script Block With Malicious String
id: 0f09cedd-10f1-4b9f-bdea-7a8b06ea575d
status: stable
level: medium
author: Steven Dick
description: The following analytic detects the execution of multiple offensive toolkits and commands by leveraging PowerShell Script Block Logging (EventCode=4104). This method captures and logs the full
  command sent to PowerShell, allowing for the identification of suspicious activities including several well-known tools used for credential theft, lateral movement, and persistence. If confirmed malicious,
  this could lead to unauthorized access, privilege escalation, and potential compromise of sensitive information within the environment.
references:
- https://attack.mitre.org/techniques/T1059/001/
- https://github.com/PowerShellMafia/PowerSploit
- https://github.com/PowerShellEmpire/
- https://github.com/S3cur3Th1sSh1t/PowerSharpPack
tags:
- attack.T1059_001
date: '2025-01-13'
logsource:
  product: windows
  service: powershell
detection:
  selection_0:
    ScriptBlockText|contains: '*'
  selection_1:
    EventID: 4104
  condition: selection_0 and selection_1
