title: Windows Office Product Spawned MSDT
id: a3148fad-3734-4b7f-9a71-62f08d39fab1
status: stable
level: medium
author: Michael Haag, Teoderick Contreras, Splunk
description: The following analytic detects a Microsoft Office product spawning the Windows msdt.exe process. This detection leverages data from Endpoint Detection and Response (EDR) agents, focusing on
  process creation events where Office applications are the parent process. This activity is significant as it may indicate an attempt to exploit protocol handlers to bypass security controls, even if macros
  are disabled. If confirmed malicious, this behavior could allow an attacker to execute arbitrary code, potentially leading to system compromise, data exfiltration, or further lateral movement within the
  network.
