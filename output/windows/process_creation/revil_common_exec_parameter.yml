title: Revil Common Exec Parameter
id: 85facebe-c382-11eb-9c3e-acde48001122
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the execution of command-line parameters commonly associated with REVIL ransomware, such as "-nolan", "-nolocal", "-fast", and "-full". It leverages data from
  Endpoint Detection and Response (EDR) agents, focusing on process execution logs mapped to the `Processes` node of the `Endpoint` data model. This activity is significant because these parameters are
  indicative of ransomware attempting to encrypt files on a compromised machine. If confirmed malicious, this could lead to widespread data encryption, rendering critical files inaccessible and potentially
  causing significant operational disruption.
references:
- https://krebsonsecurity.com/2021/05/a-closer-look-at-the-darkside-ransomware-gang/
- https://www.mcafee.com/blogs/other-blogs/mcafee-labs/mcafee-atr-analyzes-sodinokibi-aka-revil-ransomware-as-a-service-what-the-code-tells-us/
tags:
- attack.T1204
date: '2021-06-04'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    CommandLine|contains: '* -nolan *'
  selection_1:
    CommandLine|contains: '* -nolocal *'
  condition: selection_0 and selection_1
