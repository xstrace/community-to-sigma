title: Windows Server Software Component GACUtil Install to GAC
id: 7c025ef0-9e65-4c57-be39-1c13dbb1613e
status: stable
level: medium
author: Michael Haag, Splunk
description: The following analytic detects the use of GACUtil.exe to add a DLL into the Global Assembly Cache (GAC). It leverages data from Endpoint Detection and Response (EDR) agents, focusing on process
  names and command-line executions. This activity is significant because adding a DLL to the GAC allows it to be called by any application, potentially enabling widespread code execution. If confirmed
  malicious, this could allow an attacker to execute arbitrary code across the operating system, leading to privilege escalation or persistent access.
references:
- https://strontic.github.io/xcyclopedia/library/gacutil.exe-F2FE4DF74BD214EDDC1A658043828089.html
- https://www.microsoft.com/en-us/security/blog/2022/12/12/iis-modules-the-evolution-of-web-shells-and-how-to-detect-them/
- https://www.microsoft.com/en-us/security/blog/2022/07/26/malicious-iis-extensions-quietly-open-persistent-backdoors-into-servers/
- https://learn.microsoft.com/en-us/dotnet/framework/app-domains/gac
tags:
- attack.t1505.004
date: '2023-01-18'
original_spl: |-
  | tstats `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes
    WHERE Processes.process_name=gacutil.exe Processes.process IN ("*-i *","*/i *")
    BY Processes.action Processes.dest Processes.original_file_name
       Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid
       Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path
       Processes.process Processes.process_exec Processes.process_guid
       Processes.process_hash Processes.process_id Processes.process_integrity_level
       Processes.process_name Processes.process_path Processes.user
       Processes.user_id Processes.vendor_product
  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | `windows_server_software_component_gacutil_install_to_gac_filter`
splunk_rule_id: 7c025ef0-9e65-4c57-be39-1c13dbb1613e
splunk_rule_type: TTP
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: gacutil.exe
  selection_1:
    CommandLine|contains:
    - '-i '
    - '/i '
  condition: selection_0 and selection_1
