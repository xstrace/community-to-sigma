title: Windows Net System Service Discovery
id: dd7da098-83b8-4c48-b09d-e51aeb621e81
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: The following analytic detects the enumeration of Windows services using the net start command, which is a built-in utility that lists all running services on a system. Adversaries, system
  administrators, or automated tools may use this command to gain situational awareness of what services are active, identify potential security software, or discover opportunities for privilege escalation
  and lateral movement. The execution of net start is often associated with reconnaissance activity during the early stages of an intrusion, as attackers attempt to map out the system’s defense mechanisms
  and operational services. By monitoring process execution for instances of cmd.exe /c net start or similar command-line usage, defenders can detect potentially suspicious activity. Correlating this behavior
  with other reconnaissance commands, such as tasklist or sc query, strengthens detection fidelity. While net start is not inherently malicious, unusual or repeated use in non-administrative contexts should
  be flagged for further investigation.
references:
- https://cert.gov.ua/article/6284730
tags:
- attack.T1007
date: '2021-05-07'
