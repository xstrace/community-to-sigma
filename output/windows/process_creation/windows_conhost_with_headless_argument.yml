title: Windows ConHost with Headless Argument
id: d5039508-998d-4cfc-8b5e-9dcd679d9a62
status: stable
level: medium
author: Michael Haag, Splunk
description: The following analytic detects the unusual invocation of the Windows Console Host process (conhost.exe) with the undocumented --headless parameter. This detection leverages Endpoint Detection
  and Response (EDR) telemetry, specifically monitoring for command-line executions where conhost.exe is executed with the --headless argument. This activity is significant for a SOC as it is not commonly
  used in legitimate operations and may indicate an attacker's attempt to execute commands stealthily. If confirmed malicious, this behavior could lead to persistence, lateral movement, or other malicious
  activities, potentially resulting in data exfiltration or system compromise.
references:
- https://x.com/embee_research/status/1559410767564181504?s=20
- https://x.com/GroupIB_TI/status/1719675754886131959?s=20
tags:
- attack.T1564_003
- attack.T1564_006
date: '2023-11-16'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: conhost.exe
  selection_1:
    CommandLine|contains: '*--headless *'
  condition: selection_0 and selection_1
