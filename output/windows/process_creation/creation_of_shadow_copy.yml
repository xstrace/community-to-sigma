title: Creation of Shadow Copy
id: eb120f5f-b879-4a63-97c1-93352b5df844
status: stable
level: medium
author: Patrick Bareiss, Splunk
description: The following analytic detects the creation of shadow copies using Vssadmin or Wmic. It leverages data from Endpoint Detection and Response (EDR) agents, focusing on process execution logs
  that include command-line details. This activity is significant because creating shadow copies can be a precursor to ransomware attacks or data exfiltration, allowing attackers to bypass file locks and
  access sensitive data. If confirmed malicious, this behavior could enable attackers to maintain persistence, recover deleted files, or prepare for further malicious activities, posing a significant risk
  to the integrity and confidentiality of the system.
references:
- https://2017.zeronights.org/wp-content/uploads/materials/ZN17_Kheirkhabarov_Hunting_for_Credentials_Dumping_in_Windows_Environment.pdf
- https://media.defense.gov/2023/May/24/2003229517/-1/-1/0/CSA_Living_off_the_Land.PDF
tags:
- attack.T1003_003
date: '2019-12-11'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: vssadmin.exe
    CommandLine|contains: '*create*'
  selection_1:
    Image: wmic.exe
    CommandLine|contains: '*shadowcopy*'
  condition: selection_0 and selection_1
