title: Deleting Shadow Copies
id: b89919ed-ee5f-492c-b139-95dbb162039e
status: stable
level: medium
author: David Dorsey, Splunk
description: The following analytic detects the deletion of shadow copies using the vssadmin.exe or wmic.exe utilities. It leverages data from Endpoint Detection and Response (EDR) agents, focusing on process
  names and command-line arguments. This activity is significant because deleting shadow copies is a common tactic used by attackers to prevent recovery and hide their tracks. If confirmed malicious, this
  action could hinder incident response efforts and allow attackers to maintain persistence and cover their activities, making it crucial for security teams to investigate promptly.
references:
- https://blogs.vmware.com/security/2022/10/lockbit-3-0-also-known-as-lockbit-black.html
tags:
- attack.T1490
date: '2020-04-29'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: vssadmin.exe
  selection_1:
    Image: wmic.exe
  selection_2:
    CommandLine|contains: '*delete*'
  selection_3:
    CommandLine|contains: '*shadow*'
  condition: selection_0 and selection_1 and selection_2 and selection_3
