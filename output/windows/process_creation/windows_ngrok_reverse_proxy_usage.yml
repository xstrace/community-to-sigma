title: Windows Ngrok Reverse Proxy Usage
id: e2549f2c-0aef-408a-b0c1-e0f270623436
status: stable
level: medium
author: Michael Haag, Splunk
description: The following analytic detects the execution of ngrok.exe on a Windows operating system. It leverages data from Endpoint Detection and Response (EDR) agents, focusing on process names and command-line
  arguments. This activity is significant because while ngrok is a legitimate tool for creating secure tunnels, it is increasingly used by adversaries to bypass network defenses and establish reverse proxies.
  If confirmed malicious, this could allow attackers to exfiltrate data, maintain persistence, or facilitate further attacks by tunneling traffic through the compromised system.
references:
- https://www.cisa.gov/uscert/sites/default/files/publications/aa22-320a_joint_csa_iranian_government-sponsored_apt_actors_compromise_federal%20network_deploy_crypto%20miner_credential_harvester.pdf
tags:
- attack.T1572
- attack.T1090
- attack.T1102
date: '2022-11-16'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: ngrok.exe
  selection_1:
    CommandLine|contains:
    - '*start*'
    - '*--config*'
    - '*http*'
    - '*authtoken*'
    - '*http*'
    - '*tcp*'
  condition: selection_0 and selection_1
