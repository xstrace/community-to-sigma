title: Windows FFmpeg DirectShow Video Capture
id: 636f1a0b-562a-4629-80f6-5ad46d2ebdee
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: This analytic detects active video capture performed by FFmpeg (ffmpeg.exe) via the Windows DirectShow (dshow) interface, a technique observed in SalatStealer and related UAC-0252 campaigns.
  After enumerating available devices, threat actors invoke FFmpeg with a specific video capture command that references a named webcam device (video=), requests MJPEG encoding (mjpeg), and uses the dshow
  input filter — all from a temporary directory to reduce forensic footprint. This sequence moves beyond reconnaissance into active collection, aligning with MITRE ATT&CK T1125 (Video Capture), where adversaries
  silently record from the victim's webcam to gather intelligence or capture sensitive on-screen activity. The presence of ffmpeg.exe in a temp path combined with these DirectShow video arguments is highly
  anomalous outside of dedicated multimedia or screen-recording software, making it a strong signal of covert surveillance activity.
references:
- https://www.broadcom.com/support/security-center/protection-bulletin/uac-0252-activity-delivering-shadowsniff-and-salatstealer-malware
- https://bazaar.abuse.ch/browse/tag/SalatStealer/
tags:
- attack.T1125
date: '2026-05-20'
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: ffmpeg.exe
  selection_1:
    OriginalFileName: ffmpeg.exe
  selection_2:
    Image|contains: '*\temp\*'
  selection_3:
    CommandLine|contains: '*video=*'
  selection_4:
    CommandLine|contains: '* mjpeg *'
  selection_5:
    CommandLine|contains: '* dshow *'
  condition: selection_0 and selection_1 and selection_2 and selection_3 and selection_4 and selection_5
