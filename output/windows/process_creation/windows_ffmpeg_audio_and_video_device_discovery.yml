title: Windows FFmpeg Audio and Video Device Discovery
id: 6394c389-3863-4677-bcbd-07d1519b34d2
status: stable
level: medium
author: Teoderick Contreras, Splunk
description: This analytic detects the use of FFmpeg (ffmpeg.exe) to enumerate connected audio and video devices on a Windows endpoint. Adversaries and stealers such as SalatStealer abuse FFmpeg's DirectShow
  (dshow) input interface by invoking it with the -list_devices true and -hide_banner flags from a temporary directory, allowing them to silently discover available webcams, microphones, and capture cards
  without triggering obvious user-facing activity. Device discovery of this kind maps to MITRE ATT&CK T1125 (Video Capture), where threat actors profile the system's multimedia capabilities as a precursor
  to covert audio or video surveillance. The combination of an unusual process path (temp), the dshow input filter, and the device-listing arguments is a strong indicator of malicious reconnaissance rather
  than legitimate administrative use.
references:
- https://www.broadcom.com/support/security-center/protection-bulletin/uac-0252-activity-delivering-shadowsniff-and-salatstealer-malware
- https://bazaar.abuse.ch/browse/tag/SalatStealer/
tags:
- attack.t1125
date: '2026-05-20'
original_spl: |-
  | tstats `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes
    WHERE (
            (
              Processes.process_name = ffmpeg.exe OR
              Processes.original_file_name = ffmpeg.exe
             ) AND

            Processes.process_path IN ("*\\temp\\*") AND
            Processes.process = "*-list_devices*" AND
            Processes.process = "*-hide_banner*" AND
            Processes.process = "* dshow *"
          )
    BY Processes.action Processes.dest Processes.original_file_name
       Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid
       Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path
       Processes.process Processes.process_exec Processes.process_guid
       Processes.process_hash Processes.process_id Processes.process_integrity_level
       Processes.process_name Processes.process_path Processes.user
       Processes.user_id Processes.vendor_product
  | `drop_dm_object_name(Processes)`
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | `windows_ffmpeg_audio_and_video_device_discovery_filter`
splunk_rule_id: 6394c389-3863-4677-bcbd-07d1519b34d2
splunk_rule_type: Anomaly
logsource:
  category: process_creation
  product: windows
detection:
  selection_0:
    Image: ffmpeg.exe
  selection_1:
    OriginalFileName: ffmpeg.exe
  selection_2:
    Image|contains: \temp\
  selection_3:
    CommandLine|contains: -list_devices
  selection_4:
    CommandLine|contains: -hide_banner
  selection_5:
    CommandLine|contains: ' dshow '
  condition: selection_0 and selection_1 and selection_2 and selection_3 and selection_4 and selection_5
