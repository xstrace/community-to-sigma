  selection_1:
    QueryName|contains:
    - //objects.githubusercontent.com
    - anonfiles.com
    - .argotunnel.com
    - cdn.discordapp.com
    - ddns.net
    - dl.dropboxusercontent.com
    - duckdns.org
    - ghostbin.co
    - glitch.me
    - gofile.io
    - hastebin.com
    - mediafire.com
    - mega.nz
    - ngrok.io
    - onrender.com
    - pages.dev
    - paste.ee
    - pastebin.com
    - pastebin.pl
    - pasteio.com
    - pastetext.net
    - privatlab.com
    - privatlab.net
    - send.exploit.in
    - sendspace.com
    - storage.googleapis.com
    - storjshare.io
    - supabase.co
    - temp.sh
    - textbin
    - transfer.sh
    - trycloudflare.com
    - ufile.io
