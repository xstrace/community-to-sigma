title: ASL AWS Credential Access RDS Password reset
id: d15e9bd9-ef64-4d84-bc04-f62955a9fee8
status: stable
level: medium
author: Patrick Bareiss, Splunk
description: The following analytic detects the resetting of the master user password for an Amazon RDS DB instance. It leverages AWS CloudTrail logs from Amazon Security Lake to identify events where the
  `ModifyDBInstance` API call includes a new `masterUserPassword` parameter. This activity is significant because unauthorized password resets can grant attackers access to sensitive data stored in production
  databases, such as credit card information, PII, and healthcare data. If confirmed malicious, this could lead to data breaches, regulatory non-compliance, and significant reputational damage. Immediate
  investigation is required to determine the legitimacy of the password reset.
references:
- https://aws.amazon.com/premiumsupport/knowledge-center/reset-master-user-password-rds
tags:
- attack.T1110
- attack.T1586_003
date: '2022-08-07'
logsource:
  product: aws
  service: securitylake
detection:
  selection_0:
    operation: ModifyDBInstance
  selection_1:
    operation: ModifyDBCluster
  condition: selection_0 and selection_1
