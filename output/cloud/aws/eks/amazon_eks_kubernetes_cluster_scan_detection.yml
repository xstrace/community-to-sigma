title: Amazon EKS Kubernetes cluster scan detection
id: 294c4686-63dd-4fe6-93a2-ca807626704a
status: experimental
level: medium
author: Rod Soto, Splunk
description: The following analytic detects unauthenticated requests to an Amazon EKS Kubernetes cluster, specifically identifying actions by the "system:anonymous" user. It leverages AWS CloudWatch Logs
  data, focusing on user agents and authentication details. This activity is significant as it may indicate unauthorized scanning or probing of the Kubernetes cluster, which could be a precursor to an attack.
  If confirmed malicious, this could lead to unauthorized access, data exfiltration, or disruption of services within the Kubernetes environment.
tags:
- attack.T1526
date: '2020-04-29'
logsource:
  product: aws
  service: eks
detection:
  selection_0:
    username": system:anonymous
  selection_1:
    userAgent!: AWS Security Scanner
  condition: selection_0 and selection_1
