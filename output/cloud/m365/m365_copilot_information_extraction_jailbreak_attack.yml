title: M365 Copilot Information Extraction Jailbreak Attack
id: c0ee37bb-ed43-4632-8e38-060fba80b0b2
status: experimental
level: medium
author: Rod Soto
description: Detects M365 Copilot information extraction jailbreak attacks that attempt to obtain sensitive, classified, or comprehensive data through various social engineering techniques including fictional
  entity impersonation, bulk data requests, and privacy bypass attempts. The detection searches exported eDiscovery prompt logs for extraction keywords like "transcendent," "tell me everything," "confidential,"
  "dump," "extract," "reveal," and "bypass" in the Subject_Title field, categorizing each attempt by extraction type and assigning severity levels (CRITICAL for classified/proprietary data, HIGH for bulk
  extraction or privacy bypass). Prompts are further analyzed for compound risk patterns such as "Confidential+Extraction" or "Bulk_Request+Bypass," filtering out low-severity cases to surface the most
  dangerous attempts to exfiltrate sensitive organizational information through AI manipulation.
references:
- https://www.splunk.com/en_us/blog/artificial-intelligence/m365-copilot-log-analysis-splunk.html
tags:
- attack.T1685
date: '2025-10-13'
logsource:
  category: application
  product: m365
detection:
  selection_0:
    Subject_Title|contains: '*transcendent*'
  selection_1:
    Subject_Title|contains: '*incorporeal*'
  selection_2:
    Subject_Title|contains: '*being who*'
  selection_3:
    Subject_Title|contains: '*tell me everything*'
  selection_4:
    Subject_Title|contains: '*give me all*'
  selection_5:
    Subject_Title|contains: '*comprehensive*'
  selection_6:
    Subject_Title|contains: '*step by step*'
  selection_7:
    Subject_Title|contains: '*hidden*'
  selection_8:
    Subject_Title|contains: '*secret*'
  selection_9:
    Subject_Title|contains: '*confidential*'
  selection_10:
    Subject_Title|contains: '*classified*'
  selection_11:
    Subject_Title|contains: '*internal*'
  selection_12:
    Subject_Title|contains: '*sensitive*'
  selection_13:
    Subject_Title|contains: '*proprietary*'
  selection_14:
    Subject_Title|contains: '*dump*'
  selection_15:
    Subject_Title|contains: '*extract*'
  selection_16:
    Subject_Title|contains: '*reveal*'
  selection_17:
    Subject_Title|contains: '*disclose*'
  selection_18:
    Subject_Title|contains: '*leak*'
  condition: selection_0 and selection_1 and selection_2 and selection_3 and selection_4 and selection_5 and selection_6 and selection_7 and selection_8 and selection_9 and selection_10 and selection_11
    and selection_12 and selection_13 and selection_14 and selection_15 and selection_16 and selection_17 and selection_18
