title: M365 Copilot Application Usage Pattern Anomalies
id: e3308b0c-d1a1-40d5-9486-4500f0d34731
status: stable
level: medium
author: Rod Soto
description: Detects M365 Copilot users exhibiting suspicious application usage patterns including multi-location access, abnormally high activity volumes, or access to multiple Copilot applications that
  may indicate account compromise or automated abuse. The detection aggregates M365 Copilot Graph API events per user, calculating metrics like distinct cities/countries accessed, unique IP addresses, number
  of different Copilot apps used, and average events per day over the observation period. Users are flagged when they access Copilot from multiple cities (cities_count > 1), generate excessive daily activity
  (events_per_day > 100), or use more than two different Copilot applications (app_count > 2), which are anomalous patterns suggesting credential compromise or bot-driven abuse.
references:
- https://www.splunk.com/en_us/blog/artificial-intelligence/m365-copilot-log-analysis-splunk.html
tags:
- attack.T1078
date: '2025-10-13'
logsource:
  category: application
  product: m365
detection:
  selection_0:
    appDisplayName|contains: '*Copilot*'
  selection_1:
    appDisplayName: M365ChatClient
  selection_2:
    appDisplayName: OfficeAIAppChatCopilot
  condition: selection_0 and selection_1 and selection_2
