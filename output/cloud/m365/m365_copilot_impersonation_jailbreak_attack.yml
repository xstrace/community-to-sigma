title: M365 Copilot Impersonation Jailbreak Attack
id: cc26aba8-7f4a-4078-b91a-052d6a53cb13
status: experimental
level: medium
author: Rod Soto
description: Detects M365 Copilot impersonation and roleplay jailbreak attempts where users try to manipulate the AI into adopting alternate personas, behaving as unrestricted entities, or impersonating
  malicious AI systems to bypass safety controls. The detection searches exported eDiscovery prompt logs for roleplay keywords like "pretend you are," "act as," "you are now," "amoral," and "roleplay as"
  in the Subject_Title field. Prompts are categorized into specific impersonation types (AI_Impersonation, Malicious_AI_Persona, Unrestricted_AI_Persona, etc.) to identify attempts to override the AI's
  safety guardrails through persona injection attacks.
references:
- https://www.splunk.com/en_us/blog/artificial-intelligence/m365-copilot-log-analysis-splunk.html
tags:
- attack.T1685
date: '2025-10-13'
logsource:
  category: application
  product: m365
detection:
  selection_0:
    Subject_Title|contains: '*Pretend you are*'
  selection_1:
    Subject_Title|contains: '*act as*'
  selection_2:
    Subject_Title|contains: '*you are now*'
  selection_3:
    Subject_Title|contains: '*amoral*'
  selection_4:
    Subject_Title|contains: '*being*'
  selection_5:
    Subject_Title|contains: '*roleplay as*'
  selection_6:
    Subject_Title|contains: '*imagine you are*'
  selection_7:
    Subject_Title|contains: '*behave like*'
  condition: selection_0 and selection_1 and selection_2 and selection_3 and selection_4 and selection_5 and selection_6 and selection_7
