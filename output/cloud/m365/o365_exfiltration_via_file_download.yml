title: O365 Exfiltration via File Download
id: 06b23921-bfe2-4576-89dd-616f06e129da
status: stable
level: medium
author: Steven Dick
description: The following analytic detects when an excessive number of files are downloaded from o365 by the same user over a short period of time. O365 may bundle these files together as a ZIP file, however
  each file will have it's own download event. This behavior may indicate an attacker staging data for exfiltration or an insider threat removing organizational data. Additional attention should be taken
  with any Azure Guest (#EXT#) accounts.
references:
- https://attack.mitre.org/techniques/T1567/exfil
- https://www.varonis.com/blog/sidestepping-detection-while-exfiltrating-sharepoint-data
- https://thedfirjournal.com/posts/m365-data-exfiltration-rclone/
tags:
- attack.T1567
- attack.T1530
date: '2025-01-28'
logsource:
  product: m365
  service: management
detection:
  selection_0:
    Operation|contains: filedownloaded
  condition: selection_0
