    - '*\powershell_ise.exe'
    - '*\powershell.exe'
    - '*\Presentationhost.exe'
    - '*\pwsh.exe'
    - '*\Rasautou.exe'
    - '*\Regasm.exe'
    - '*\Register-cimprovider.exe'
