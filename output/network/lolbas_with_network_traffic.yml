title: LOLBAS With Network Traffic
id: 2820f032-19eb-497e-8642-25b04a880359
status: stable
level: medium
author: Steven Dick
description: The following analytic identifies the use of Living Off the Land Binaries and Scripts (LOLBAS) with network traffic. It leverages data from the Network Traffic data model to detect when native
  Windows binaries, often abused by adversaries, initiate network connections. This activity is significant as LOLBAS are frequently used to download malicious payloads, enabling lateral movement, command-and-control,
  or data exfiltration. If confirmed malicious, this behavior could allow attackers to execute arbitrary code, escalate privileges, or maintain persistence within the environment, posing a severe threat
  to organizational security.
references:
- https://lolbas-project.github.io/#
- https://www.sans.org/presentations/lolbin-detection-methods-seven-common-attacks-revealed/
tags:
- attack.T1105
- attack.T1567
- attack.T1218
date: '2023-02-02'
logsource:
  category: all_traffic
detection:
  selection_0:
