    - '*\Bitsadmin.exe'
    - '*\Certoc.exe'
    - '*\certutil.exe'
    - '*\cmd.exe'
    - '*\Cmstp.exe'
    - '*\cscript.exe'
    - '*\Diskshadow.exe'
    - '*\Dnscmd.exe'
    - '*\Extexport.exe'
    - '*\Forfiles.exe'
    - '*\Ftp.exe'
    - '*\Gpscript.exe'
    - '*\Hh.exe'
    - '*\Ie4uinit.exe'
    - '*\Ieexec.exe'
    - '*\Infdefaultinstall.exe'
    - '*\Installutil.exe'
    - '*\makecab.exe'
    - '*\Mavinject.exe'
    - '*\Microsoft.Workflow.Compiler.exe'
    - '*\Msbuild.exe'
    - '*\Msconfig.exe'
    - '*\Msdt.exe'
    - '*\Mshta.exe'
    - '*\Msiexec.exe'
    - '*\Netsh.exe'
    - '*\notepad.exe'
