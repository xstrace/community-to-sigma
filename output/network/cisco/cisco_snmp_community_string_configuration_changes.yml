title: Cisco SNMP Community String Configuration Changes
id: b0ce5521-2533-4f24-b8d5-c2ff977aae08
status: stable
level: medium
author: Bhavin Patel, Michael Haag, Splunk
description: This analytic detects changes to SNMP community strings on Cisco devices, which could indicate an attacker establishing persistence or attempting to extract credentials. After gaining initial
  access to network devices, threat actors like Static Tundra often modify SNMP configurations to enable unauthorized monitoring and data collection. This detection specifically looks for the configuration
  of SNMP community strings with read-write (rw) or read-only (ro) permissions, as well as the configuration of SNMP hosts that may be used to exfiltrate data. These activities are particularly concerning
  as they may represent attempts to establish persistent access or extract sensitive information from compromised devices.
references:
- https://blog.talosintelligence.com/static-tundra/
- https://tools.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-20180328-smi2
- https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/snmp/command/snmp-cr-book/snmp-s1.html#wp1307296356
tags:
- attack.T1685
- attack.T1040
- attack.T1552
date: '2025-08-21'
logsource:
  category: process_creation
  product: cisco
detection:
  selection_0:
    CommandLine|contains: '*snmp-server community*rw*'
  selection_1:
    CommandLine|contains: '*snmp-server community*ro*'
  selection_2:
    CommandLine|contains: '*snmp-server host*'
  condition: selection_0 and selection_1 and selection_2
