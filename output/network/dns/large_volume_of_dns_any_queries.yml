title: Large Volume of DNS ANY Queries
id: 8fa891f7-a533-4b3c-af85-5aa2e7c1f1eb
status: experimental
level: medium
author: Bhavin Patel, Splunk
description: The following analytic identifies a large volume of DNS ANY queries, which may indicate a DNS amplification attack. It leverages the Network_Resolution data model to count DNS queries of type
  "ANY" directed to specific destinations. This activity is significant because DNS amplification attacks can overwhelm network resources, leading to Denial of Service (DoS) conditions. If confirmed malicious,
  this activity could disrupt services, degrade network performance, and potentially be part of a larger Distributed Denial of Service (DDoS) attack, impacting the availability of critical infrastructure.
tags:
- attack.t1498.002
date: '2020-04-29'
original_spl: |-
  | tstats `security_content_summariesonly` count FROM datamodel=Network_Resolution
    WHERE nodename=DNS "DNS.message_type"="QUERY" "DNS.record_type"="ANY"
    BY "DNS.dest"
  | `drop_dm_object_name("DNS")`
  | where count>200
  | `large_volume_of_dns_any_queries_filter`
splunk_rule_id: 8fa891f7-a533-4b3c-af85-5aa2e7c1f1eb
splunk_rule_type: Anomaly
logsource:
  category: dns
detection:
  selection_0:
    nodename: DNS
  selection_1:
    '"DNS.message_type"': QUERY
  selection_2:
    '"DNS.record_type"': ANY
  condition: selection_0 and selection_1 and selection_2
