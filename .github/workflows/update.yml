name: Update Sigma Rules

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - '**.lark'
      - 'requirements.txt'
      - 'update.sh'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest test_parser.py -v

  convert:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Clone security_content
        run: |
          git clone --depth 1 https://github.com/splunk/security_content.git /tmp/security_content
          echo "SC_COMMIT=$(git -C /tmp/security_content rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Run conversion
        run: python main.py --input-dir /tmp/security_content/detections --macro-dir /tmp/security_content/macros --output-dir ./output

      - name: Validate Sigma rules
        run: python validate.py --output-dir ./output

      - name: Check for changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain output/ conversion_report.json)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            DELTA=$(git diff --stat output/ conversion_report.json | tail -1)
            echo "delta=$DELTA" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ conversion_report.json validation_report.json
          git commit -m "auto: update sigma rules (security_content@${{ env.SC_COMMIT }})

          ${{ steps.diff.outputs.delta }}"
          git push
